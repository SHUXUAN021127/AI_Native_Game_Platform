<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake Game 11</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 170, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.18), transparent 40%),
        linear-gradient(135deg, #08111f, #05070d);
      color: #ffffff;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(94vw, 560px);
      padding: 20px;
      border-radius: 24px;
      background: rgba(10, 18, 32, 0.86);
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      line-height: 1;
      letter-spacing: 1px;
      color: #7cffc7;
      text-shadow: 0 0 18px rgba(124, 255, 199, 0.45);
    }

    .subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: #9fb0c9;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 86px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: #9fb0c9;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .stat-value {
      display: block;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    .canvas-box {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #081526;
      border: 2px solid rgba(124, 255, 199, 0.38);
      box-shadow:
        0 0 28px rgba(124, 255, 199, 0.15),
        inset 0 0 30px rgba(0, 0, 0, 0.55);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 7, 15, 0.72);
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .panel {
      width: min(92%, 360px);
      padding: 24px;
      border-radius: 22px;
      background: rgba(12, 25, 44, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #7cffc7;
    }

    .panel p {
      margin: 8px 0;
      color: #c2cce0;
      font-size: 15px;
      line-height: 1.45;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 14px;
      color: #07101d;
      background: linear-gradient(135deg, #7cffc7, #4fe3ff);
      box-shadow: 0 10px 28px rgba(79, 227, 255, 0.2);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: scale(0.96);
    }

    button.secondary {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .hint {
      color: #9fb0c9;
      font-size: 13px;
      line-height: 1.35;
    }

    .mobile-controls {
      display: none;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .dir-btn {
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 16px;
      font-size: 24px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: none;
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }
    .right { grid-column: 3; grid-row: 2; }

    @media (max-width: 720px) {
      body {
        align-items: flex-start;
        padding-top: 10px;
        overflow-y: auto;
      }

      .game-wrapper {
        padding: 14px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .stats {
        justify-content: center;
      }

      .controls-row {
        flex-direction: column;
      }

      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrapper">
    <section class="header">
      <div>
        <h1 class="title">Snake Game 11</h1>
        <div class="subtitle">Eat food, grow longer, and avoid crashing.</div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Level</span>
          <span class="stat-value" id="level">1</span>
        </div>
      </div>
    </section>

    <section class="canvas-box">
      <canvas id="gameCanvas" width="520" height="520"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel">
          <h2 id="overlayTitle">Ready?</h2>
          <p id="overlayText">Use arrow keys or WASD to move. Eat the glowing food to score points.</p>
          <div class="buttons">
            <button id="startBtn">Start Game</button>
            <button class="secondary" id="pauseBtn">Pause</button>
          </div>
        </div>
      </div>
    </section>

    <section class="controls-row">
      <div class="hint">Keyboard: Arrow Keys / WASD · Pause: Space or P</div>
      <div class="buttons">
        <button class="secondary" id="restartBtn">Restart</button>
      </div>
    </section>

    <section class="mobile-controls" aria-label="Mobile controls">
      <button class="dir-btn up" data-dir="up">▲</button>
      <button class="dir-btn left" data-dir="left">◀</button>
      <button class="dir-btn right" data-dir="right">▶</button>
      <button class="dir-btn down" data-dir="down">▼</button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const levelEl = document.getElementById("level");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");

    const gridSize = 26;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("snakeGame11Best") || 0);
    let level;
    let speed;
    let gameRunning;
    let gamePaused;
    let gameOver;
    let loopTimer;

    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 120;
      gameRunning = false;
      gamePaused = false;
      gameOver = false;

      placeFood();
      updateUI();
      draw();

      overlayTitle.textContent = "Ready?";
      overlayText.textContent = "Use arrow keys or WASD to move. Eat the glowing food to score points.";
      startBtn.textContent = "Start Game";
      pauseBtn.textContent = "Pause";
      overlay.classList.remove("hidden");

      clearTimeout(loopTimer);
    }

    function startGame() {
      if (gameOver) resetGame();

      gameRunning = true;
      gamePaused = false;
      gameOver = false;

      overlay.classList.add("hidden");
      pauseBtn.textContent = "Pause";

      clearTimeout(loopTimer);
      gameLoop();
    }

    function restartGame() {
      resetGame();
      startGame();
    }

    function togglePause() {
      if (!gameRunning || gameOver) return;

      gamePaused = !gamePaused;

      if (gamePaused) {
        clearTimeout(loopTimer);
        pauseBtn.textContent = "Resume";
        overlayTitle.textContent = "Paused";
        overlayText.textContent = "Press Resume, Space, or P to continue.";
        startBtn.textContent = "Resume";
        overlay.classList.remove("hidden");
      } else {
        pauseBtn.textContent = "Pause";
        overlay.classList.add("hidden");
        gameLoop();
      }
    }

    function updateUI() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      levelEl.textContent = level;
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake && snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function gameLoop() {
      if (!gameRunning || gamePaused || gameOver) return;

      update();
      draw();

      loopTimer = setTimeout(gameLoop, speed);
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 11;
        level = Math.floor(score / 55) + 1;
        speed = Math.max(55, 120 - (level - 1) * 8);

        if (score > best) {
          best = score;
          localStorage.setItem("snakeGame11Best", best);
        }

        placeFood();
      } else {
        snake.pop();
      }

      updateUI();
    }

    function endGame() {
      gameOver = true;
      gameRunning = false;
      clearTimeout(loopTimer);

      draw();

      overlayTitle.textContent = "Game Over";
      overlayText.textContent = "Final Score: " + score + " · Best: " + best;
      startBtn.textContent = "Play Again";
      pauseBtn.textContent = "Pause";
      overlay.classList.remove("hidden");
    }

    function draw() {
      drawBackground();
      drawFood();
      drawSnake();
    }

    function drawBackground() {
      ctx.fillStyle = "#081526";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let x = 0; x < tileCount; x++) {
        for (let y = 0; y < tileCount; y++) {
          if ((x + y) % 2 === 0) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.025)";
          } else {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
          }
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }

      ctx.strokeStyle = "rgba(124, 255, 199, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const x = segment.x * gridSize;
        const y = segment.y * gridSize;
        const padding = index === 0 ? 2 : 3;

        const gradient = ctx.createLinearGradient(x, y, x + gridSize, y + gridSize);

        if (index === 0) {
          gradient.addColorStop(0, "#eafff7");
          gradient.addColorStop(0.45, "#7cffc7");
          gradient.addColorStop(1, "#1fd69b");
        } else {
          gradient.addColorStop(0, "#63f2b5");
          gradient.addColorStop(1, "#13a878");
        }

        ctx.fillStyle = gradient;
        roundRect(
          x + padding,
          y + padding,
          gridSize - padding * 2,
          gridSize - padding * 2,
          7
        );

        if (index === 0) {
          drawEyes(x, y);
        }
      });
    }

    function drawEyes(x, y) {
      ctx.fillStyle = "#07101d";

      let eye1 = { x: x + 8, y: y + 8 };
      let eye2 = { x: x + 18, y: y + 8 };

      if (direction.x === 1) {
        eye1 = { x: x + 17, y: y + 7 };
        eye2 = { x: x + 17, y: y + 17 };
      } else if (direction.x === -1) {
        eye1 = { x: x + 8, y: y + 7 };
        eye2 = { x: x + 8, y: y + 17 };
      } else if (direction.y === 1) {
        eye1 = { x: x + 8, y: y + 17 };
        eye2 = { x: x + 18, y: y + 17 };
      }

      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(eye2.x, eye2.y, 2.3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const centerX = food.x * gridSize + gridSize / 2;
      const centerY = food.y * gridSize + gridSize / 2;
      const pulse = 1 + Math.sin(Date.now() / 130) * 0.08;

      ctx.shadowColor = "#ff4f7b";
      ctx.shadowBlur = 18;
      ctx.fillStyle = "#ff4f7b";

      ctx.beginPath();
      ctx.arc(centerX, centerY, 8 * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ffd1dc";
      ctx.beginPath();
      ctx.arc(centerX - 3, centerY - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function setDirection(newDir) {
      if (!gameRunning && !gameOver) {
        startGame();
      }

      if (newDir === "up" && direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      } else if (newDir === "down" && direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      } else if (newDir === "left" && direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      } else if (newDir === "right" && direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d", "p"].includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") setDirection("up");
      if (key === "arrowdown" || key === "s") setDirection("down");
      if (key === "arrowleft" || key === "a") setDirection("left");
      if (key === "arrowright" || key === "d") setDirection("right");
      if (key === " " || key === "p") togglePause();
    });

    document.querySelectorAll(".dir-btn").forEach(button => {
      button.addEventListener("click", () => setDirection(button.dataset.dir));
    });

    startBtn.addEventListener("click", () => {
      if (gamePaused) {
        togglePause();
      } else {
        startGame();
      }
    });

    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", restartGame);

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? "right" : "left");
      } else {
        setDirection(dy > 0 ? "down" : "up");
      }
    }, { passive: true });

    setInterval(() => {
      if (!gameRunning || gamePaused || gameOver) {
        draw();
      }
    }, 80);

    resetGame();
  </script>
</body>
</html>
