<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Twist Puzzle</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,.08);
      --panel2: rgba(255,255,255,.12);
      --text: #eef5ff;
      --muted: #9fb0c8;
      --accent: #42e8ff;
      --accent2: #9cff6a;
      --danger: #ff5f7e;
      --tile: #16213d;
      --tile2: #1d2b50;
      --pipe: #5b6f92;
      --powered: #38e8ff;
      --gold: #ffd166;
      --shadow: rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(66,232,255,.18), transparent 28%),
        radial-gradient(circle at 80% 90%, rgba(156,255,106,.13), transparent 30%),
        linear-gradient(145deg, #060914, var(--bg));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .game {
      width: min(94vw, 760px);
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.045));
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: 0 24px 80px var(--shadow);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    header {
      padding: 24px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: .95rem;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(66,232,255,.12);
      color: var(--accent);
      border: 1px solid rgba(66,232,255,.24);
      font-weight: 800;
      white-space: nowrap;
    }

    .stats {
      padding: 16px 24px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }

    .stat span {
      display: block;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 1.2rem;
    }

    .board-wrap {
      padding: 18px 24px 24px;
      display: flex;
      justify-content: center;
    }

    #board {
      display: grid;
      gap: 8px;
      width: min(92vw, 560px);
      aspect-ratio: 1 / 1;
      padding: 10px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 35px rgba(0,0,0,.25);
    }

    .tile {
      position: relative;
      border: 0;
      border-radius: 18%;
      background: linear-gradient(145deg, var(--tile2), var(--tile));
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.08),
        inset 0 -8px 15px rgba(0,0,0,.18),
        0 8px 18px rgba(0,0,0,.22);
      cursor: pointer;
      transition: transform .12s ease, filter .18s ease, box-shadow .18s ease;
      overflow: hidden;
    }

    .tile:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .tile:active {
      transform: scale(.96);
    }

    .tile.start {
      outline: 2px solid rgba(156,255,106,.6);
    }

    .tile.end {
      outline: 2px solid rgba(255,209,102,.7);
    }

    .tile.powered {
      background:
        radial-gradient(circle at center, rgba(66,232,255,.24), transparent 56%),
        linear-gradient(145deg, #173257, #111d38);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.11),
        0 0 24px rgba(66,232,255,.25),
        0 8px 18px rgba(0,0,0,.22);
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 30%;
      height: 30%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--pipe);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.18);
      z-index: 2;
    }

    .arm {
      position: absolute;
      background: var(--pipe);
      z-index: 1;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.12);
    }

    .arm.n, .arm.s {
      width: 22%;
      height: 50%;
      left: 39%;
    }

    .arm.n {
      top: 0;
    }

    .arm.s {
      bottom: 0;
    }

    .arm.e, .arm.w {
      height: 22%;
      width: 50%;
      top: 39%;
    }

    .arm.e {
      right: 0;
    }

    .arm.w {
      left: 0;
    }

    .tile.powered .center,
    .tile.powered .arm {
      background: var(--powered);
      box-shadow:
        0 0 12px rgba(66,232,255,.9),
        inset 0 2px 0 rgba(255,255,255,.35);
    }

    .label {
      position: absolute;
      z-index: 5;
      right: 7%;
      bottom: 6%;
      font-size: clamp(.55rem, 1.7vw, .82rem);
      font-weight: 900;
      color: rgba(255,255,255,.82);
      text-shadow: 0 1px 4px #000;
      pointer-events: none;
    }

    .controls {
      padding: 0 24px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button.control {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 800;
      color: #06101a;
      cursor: pointer;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(66,232,255,.18);
      transition: transform .12s ease, filter .12s ease;
    }

    button.control.secondary {
      color: var(--text);
      background: var(--panel2);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: none;
    }

    button.control:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .message {
      min-height: 28px;
      padding: 0 24px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .message.win {
      color: var(--accent2);
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { filter: brightness(1); }
      to { filter: brightness(1.35); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(3,7,16,.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(92vw, 430px);
      background: linear-gradient(180deg, #172342, #0e172d);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 26px;
      padding: 26px;
      text-align: center;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.5;
    }

    .big-score {
      font-size: 3rem;
      font-weight: 950;
      color: var(--gold);
      margin: 10px 0;
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat:last-child {
        grid-column: span 2;
      }

      #board {
        gap: 5px;
        padding: 7px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <header>
      <div>
        <h1>Circuit Twist</h1>
        <div class="subtitle">Rotate tiles to power the path from START to CORE.</div>
      </div>
      <div class="badge" id="sizeBadge">5 × 5</div>
    </header>

    <section class="stats">
      <div class="stat"><span>Level</span><strong id="level">1</strong></div>
      <div class="stat"><span>Moves</span><strong id="moves">0</strong></div>
      <div class="stat"><span>Time</span><strong id="time">0s</strong></div>
      <div class="stat"><span>Score</span><strong id="score">1000</strong></div>
      <div class="stat"><span>Best</span><strong id="best">0</strong></div>
    </section>

    <section class="board-wrap">
      <div id="board" aria-label="Circuit puzzle board"></div>
    </section>

    <div class="message" id="message">Click any tile to rotate it clockwise.</div>

    <section class="controls">
      <button class="control" id="newGame">New Puzzle</button>
      <button class="control secondary" id="resetLevel">Reset Level</button>
      <button class="control secondary" id="hint">Hint</button>
    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Power Restored!</h2>
      <p>You connected the circuit.</p>
      <div class="big-score" id="finalScore">0</div>
      <p id="finalDetails"></p>
      <button class="control" id="nextLevel">Next Level</button>
      <button class="control secondary" id="closeModal">Keep Playing</button>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");
    const sizeBadge = document.getElementById("sizeBadge");
    const overlay = document.getElementById("overlay");
    const finalScoreEl = document.getElementById("finalScore");
    const finalDetailsEl = document.getElementById("finalDetails");

    const DIRS = [
      { k: "n", dr: -1, dc: 0, opp: "s" },
      { k: "e", dr: 0, dc: 1, opp: "w" },
      { k: "s", dr: 1, dc: 0, opp: "n" },
      { k: "w", dr: 0, dc: -1, opp: "e" }
    ];

    let level = 1;
    let size = 5;
    let tiles = [];
    let solution = [];
    let moves = 0;
    let seconds = 0;
    let timer = null;
    let won = false;
    let best = Number(localStorage.getItem("circuitTwistBest") || 0);

    bestEl.textContent = best;

    function emptyCon() {
      return { n: false, e: false, s: false, w: false };
    }

    function copyCon(c) {
      return { n: c.n, e: c.e, s: c.s, w: c.w };
    }

    function rotateCon(c) {
      return { n: c.w, e: c.n, s: c.e, w: c.s };
    }

    function sameCon(a, b) {
      return a.n === b.n && a.e === b.e && a.s === b.s && a.w === b.w;
    }

    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function key(r, c) {
      return r + "," + c;
    }

    function generatePath(n) {
      const target = key(n - 1, n - 1);
      const visited = new Set();
      const path = [];

      function dfs(r, c) {
        visited.add(key(r, c));
        path.push({ r, c });

        if (key(r, c) === target) return true;

        const dirs = shuffle(DIRS);
        dirs.sort((a, b) => {
          const da = Math.abs((r + a.dr) - (n - 1)) + Math.abs((c + a.dc) - (n - 1));
          const db = Math.abs((r + b.dr) - (n - 1)) + Math.abs((c + b.dc) - (n - 1));
          return da - db + (Math.random() - .5);
        });

        for (const d of dirs) {
          const nr = r + d.dr;
          const nc = c + d.dc;
          if (nr < 0 || nc < 0 || nr >= n || nc >= n) continue;
          if (visited.has(key(nr, nc))) continue;
          if (dfs(nr, nc)) return true;
        }

        path.pop();
        return false;
      }

      dfs(0, 0);
      return path;
    }

    function randomPipe() {
      const shapes = [
        { n: true, e: true, s: false, w: false },
        { n: false, e: true, s: true, w: false },
        { n: false, e: false, s: true, w: true },
        { n: true, e: false, s: false, w: true },
        { n: true, e: false, s: true, w: false },
        { n: false, e: true, s: false, w: true },
        { n: true, e: true, s: true, w: false },
        { n: false, e: true, s: true, w: true }
      ];
      return copyCon(shapes[randomInt(shapes.length)]);
    }

    function buildPuzzle() {
      size = Math.min(7, 4 + level);
      sizeBadge.textContent = size + " × " + size;
      solution = generatePath(size);
      tiles = Array.from({ length: size }, (_, r) =>
        Array.from({ length: size }, (_, c) => ({
          r,
          c,
          con: randomPipe(),
          sol: null,
          path: false,
          powered: false
        }))
      );

      for (let i = 0; i < solution.length; i++) {
        const p = solution[i];
        const con = emptyCon();

        if (i === 0) con.w = true;
        if (i === solution.length - 1) con.e = true;

        if (i > 0) {
          const prev = solution[i - 1];
          const dr = prev.r - p.r;
          const dc = prev.c - p.c;
          const d = DIRS.find(x => x.dr === dr && x.dc === dc);
          con[d.k] = true;
        }

        if (i < solution.length - 1) {
          const next = solution[i + 1];
          const dr = next.r - p.r;
          const dc = next.c - p.c;
          const d = DIRS.find(x => x.dr === dr && x.dc === dc);
          con[d.k] = true;
        }

        tiles[p.r][p.c].con = copyCon(con);
        tiles[p.r][p.c].sol = copyCon(con);
        tiles[p.r][p.c].path = true;
      }

      let solvedAfterShuffle = true;
      let attempts = 0;

      while (solvedAfterShuffle && attempts < 20) {
        attempts++;
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            const tile = tiles[r][c];
            tile.con = tile.path ? copyCon(tile.sol) : randomPipe();
            const turns = randomInt(4);
            for (let t = 0; t < turns; t++) tile.con = rotateCon(tile.con);
          }
        }
        solvedAfterShuffle = checkWin(false);
      }

      moves = 0;
      seconds = 0;
      won = false;
      messageEl.textContent = "Click any tile to rotate it clockwise.";
      messageEl.className = "message";
      startTimer();
      render();
      updateStats();
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => {
        if (!won) {
          seconds++;
          updateStats();
        }
      }, 1000);
    }

    function currentScore() {
      return Math.max(0, 1000 + level * 150 - moves * 12 - seconds * 3);
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      timeEl.textContent = seconds + "s";
      scoreEl.textContent = currentScore();
      bestEl.textContent = best;
    }

    function poweredCells() {
      for (const row of tiles) for (const tile of row) tile.powered = false;

      const start = tiles[0][0];
      if (!start.con.w) return new Set();

      const seen = new Set([key(0, 0)]);
      const queue = [start];
      start.powered = true;

      while (queue.length) {
        const tile = queue.shift();
        for (const d of DIRS) {
          if (!tile.con[d.k]) continue;
          const nr = tile.r + d.dr;
          const nc = tile.c + d.dc;
          if (nr < 0 || nc < 0 || nr >= size || nc >= size) continue;
          const next = tiles[nr][nc];
          if (!next.con[d.opp]) continue;
          const id = key(nr, nc);
          if (seen.has(id)) continue;
          seen.add(id);
          next.powered = true;
          queue.push(next);
        }
      }

      return seen;
    }

    function checkWin(updatePower = true) {
      const seen = poweredCells();
      const end = tiles[size - 1][size - 1];
      const success = seen.has(key(size - 1, size - 1)) && end.con.e;
      if (!updatePower) return success;
      return success;
    }

    function render() {
      boardEl.innerHTML = "";
      boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

      poweredCells();

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const tile = tiles[r][c];
          const btn = document.createElement("button");
          btn.className = "tile";
          if (tile.powered) btn.classList.add("powered");
          if (r === 0 && c === 0) btn.classList.add("start");
          if (r === size - 1 && c === size - 1) btn.classList.add("end");
          btn.setAttribute("aria-label", `Tile ${r + 1}, ${c + 1}`);

          const center = document.createElement("div");
          center.className = "center";
          btn.appendChild(center);

          for (const d of DIRS) {
            if (tile.con[d.k]) {
              const arm = document.createElement("div");
              arm.className = "arm " + d.k;
              btn.appendChild(arm);
            }
          }

          if (r === 0 && c === 0) {
            const lab = document.createElement("div");
            lab.className = "label";
            lab.textContent = "START";
            btn.appendChild(lab);
          }

          if (r === size - 1 && c === size - 1) {
            const lab = document.createElement("div");
            lab.className = "label";
            lab.textContent = "CORE";
            btn.appendChild(lab);
          }

          btn.addEventListener("click", () => rotateTile(r, c));
          boardEl.appendChild(btn);
        }
      }
    }

    function rotateTile(r, c) {
      if (won) return;
      tiles[r][c].con = rotateCon(tiles[r][c].con);
      moves++;
      const success = checkWin(true);
      render();
      updateStats();

      if (success) {
        winGame();
      } else {
        const powered = poweredCells().size;
        messageEl.textContent = powered > 1
          ? `${powered} tiles are powered. Keep twisting!`
          : "The START tile must open to the left and connect forward.";
      }
    }

    function winGame() {
      won = true;
      clearInterval(timer);
      const score = currentScore();
      if (score > best) {
        best = score;
        localStorage.setItem("circuitTwistBest", best);
      }
      updateStats();
      messageEl.textContent = "Complete circuit! Great work.";
      messageEl.className = "message win";
      finalScoreEl.textContent = score;
      finalDetailsEl.textContent = `Level ${level} • ${moves} moves • ${seconds}s`;
      setTimeout(() => overlay.classList.add("show"), 450);
    }

    function hint() {
      if (won) return;

      const wrong = [];
      for (const p of solution) {
        const tile = tiles[p.r][p.c];
        if (!sameCon(tile.con, tile.sol)) wrong.push(tile);
      }

      if (!wrong.length) {
        messageEl.textContent = "The main path is aligned. Check START and CORE connections.";
        return;
      }

      const tile = wrong[randomInt(wrong.length)];
      tile.con = rotateCon(tile.con);
      moves += 2;
      messageEl.textContent = "Hint used: one path tile was nudged. It costs 2 moves.";
      const success = checkWin(true);
      render();
      updateStats();
      if (success) winGame();
    }

    document.getElementById("newGame").addEventListener("click", () => {
      overlay.classList.remove("show");
      buildPuzzle();
    });

    document.getElementById("resetLevel").addEventListener("click", () => {
      overlay.classList.remove("show");
      buildPuzzle();
    });

    document.getElementById("hint").addEventListener("click", hint);

    document.getElementById("nextLevel").addEventListener("click", () => {
      overlay.classList.remove("show");
      level++;
      buildPuzzle();
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      overlay.classList.remove("show");
    });

    buildPuzzle();
  </script>
</body>
</html>
