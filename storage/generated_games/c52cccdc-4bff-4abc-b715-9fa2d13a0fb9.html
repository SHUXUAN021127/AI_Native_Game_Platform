<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Platform Adventure</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #5cc8ff;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(#5cc8ff 0%, #91dcff 58%, #7ad15a 58%, #55b747 100%);
  }
  canvas {
    width: min(100vw, 1100px);
    height: min(100vh, 620px);
    background: #5cc8ff;
    border: 5px solid #172033;
    border-radius: 14px;
    box-shadow: 0 18px 40px rgba(0,0,0,.35);
    image-rendering: pixelated;
  }
  #ui {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: min(100vw, 1100px);
    padding: 0 20px;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    font-weight: 900;
    text-shadow: 3px 3px 0 #172033;
    font-size: clamp(15px, 2.5vw, 26px);
  }
  #message {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(23,32,51,.9);
    color: white;
    padding: 26px 36px;
    border: 4px solid white;
    border-radius: 18px;
    text-align: center;
    font-weight: 900;
    display: none;
    box-shadow: 0 14px 32px rgba(0,0,0,.4);
  }
  #message h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 54px); }
  #message p { margin: 8px 0; font-size: clamp(15px, 2.2vw, 22px); }
  #touch {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
  }
  .btn {
    pointer-events: auto;
    position: absolute;
    bottom: 22px;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: rgba(255,255,255,.32);
    border: 3px solid rgba(255,255,255,.75);
    color: white;
    display: grid;
    place-items: center;
    font-size: 30px;
    font-weight: 900;
    text-shadow: 2px 2px 0 #172033;
    backdrop-filter: blur(4px);
  }
  #leftBtn { left: 24px; }
  #rightBtn { left: 102px; }
  #jumpBtn { right: 24px; width: 82px; height: 82px; }
  @media (pointer: coarse) {
    #touch { display: block; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1100" height="620"></canvas>

  <div id="ui">
    <div>SCORE: <span id="score">0</span></div>
    <div>COINS: <span id="coins">0</span>/<span id="totalCoins">0</span></div>
    <div>LIVES: <span id="lives">3</span></div>
    <div>TIME: <span id="time">300</span></div>
  </div>

  <div id="message">
    <h1 id="msgTitle">Platform Adventure</h1>
    <p id="msgText">Arrow keys / A,D to move. Space / W / Up to jump.</p>
    <p>Press Enter or Tap to Start</p>
  </div>

  <div id="touch">
    <div class="btn" id="leftBtn">◀</div>
    <div class="btn" id="rightBtn">▶</div>
    <div class="btn" id="jumpBtn">▲</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const coinsEl = document.getElementById("coins");
  const totalCoinsEl = document.getElementById("totalCoins");
  const livesEl = document.getElementById("lives");
  const timeEl = document.getElementById("time");
  const message = document.getElementById("message");
  const msgTitle = document.getElementById("msgTitle");
  const msgText = document.getElementById("msgText");

  const W = canvas.width, H = canvas.height;
  const TILE = 44;
  const GRAVITY = 0.82;
  const FRICTION = 0.83;
  const MOVE = 0.78;
  const MAX_SPEED = 7.2;
  const JUMP = 17.8;

  let keys = {};
  let camera = { x: 0, y: 0 };
  let state = "start";
  let score = 0, coinsGot = 0, lives = 3, gameTime = 300, lastSecond = 0;
  let particles = [];

  const playerStart = { x: 90, y: 260 };

  const level = {
    width: 5200,
    height: 620,
    platforms: [],
    coins: [],
    enemies: [],
    springs: [],
    flag: { x: 4960, y: 198, w: 22, h: 282 }
  };

  const player = {
    x: playerStart.x, y: playerStart.y, w: 34, h: 48,
    vx: 0, vy: 0, grounded: false, facing: 1, inv: 0
  };

  function rect(x,y,w,h,type="ground") {
    level.platforms.push({x,y,w,h,type});
  }
  function coin(x,y) {
    level.coins.push({x,y,r:13,taken:false,float:Math.random()*10});
  }
  function enemy(x,y,minX,maxX) {
    level.enemies.push({x,y,w:38,h:34,vx:1.3,minX,maxX,alive:true,deadTimer:0});
  }
  function spring(x,y) {
    level.springs.push({x,y,w:36,h:22,active:0});
  }

  function buildLevel() {
    level.platforms.length = 0;
    level.coins.length = 0;
    level.enemies.length = 0;
    level.springs.length = 0;

    rect(0, 532, 760, 88);
    rect(850, 532, 440, 88);
    rect(1400, 532, 600, 88);
    rect(2100, 532, 480, 88);
    rect(2680, 532, 730, 88);
    rect(3520, 532, 520, 88);
    rect(4140, 532, 1060, 88);

    rect(320, 414, 210, 34, "brick");
    rect(650, 350, 176, 34, "brick");
    rect(1000, 430, 220, 34, "brick");
    rect(1290, 360, 132, 34, "brick");
    rect(1580, 442, 176, 34, "brick");
    rect(1850, 340, 220, 34, "brick");
    rect(2250, 418, 220, 34, "brick");
    rect(2510, 340, 176, 34, "brick");
    rect(2870, 430, 220, 34, "brick");
    rect(3180, 354, 176, 34, "brick");
    rect(3690, 428, 220, 34, "brick");
    rect(3970, 348, 176, 34, "brick");
    rect(4320, 430, 176, 34, "brick");
    rect(4610, 350, 220, 34, "brick");

    rect(780, 488, 66, 44, "pipe");
    rect(2050, 444, 88, 88, "pipe");
    rect(3430, 488, 66, 44, "pipe");
    rect(4860, 444, 88, 88, "pipe");

    for (let i=0;i<8;i++) coin(350+i*26, 370);
    for (let i=0;i<6;i++) coin(660+i*27, 308);
    for (let i=0;i<8;i++) coin(990+i*30, 392);
    for (let i=0;i<5;i++) coin(1298+i*28, 318);
    for (let i=0;i<7;i++) coin(1600+i*27, 400);
    for (let i=0;i<7;i++) coin(1870+i*29, 298);
    for (let i=0;i<8;i++) coin(2260+i*28, 378);
    for (let i=0;i<6;i++) coin(2520+i*27, 298);
    for (let i=0;i<7;i++) coin(2880+i*28, 390);
    for (let i=0;i<6;i++) coin(3190+i*28, 312);
    for (let i=0;i<7;i++) coin(3700+i*28, 386);
    for (let i=0;i<6;i++) coin(3980+i*28, 306);
    for (let i=0;i<8;i++) coin(4330+i*27, 388);
    for (let i=0;i<8;i++) coin(4625+i*27, 308);

    for (let i=0;i<12;i++) coin(2300+i*85, 480);

    enemy(560, 498, 70, 720);
    enemy(1120, 498, 880, 1250);
    enemy(1700, 498, 1450, 1970);
    enemy(2380, 498, 2140, 2550);
    enemy(3000, 498, 2700, 3370);
    enemy(3820, 498, 3540, 4010);
    enemy(4440, 498, 4160, 4840);

    spring(1350, 510);
    spring(2740, 510);
    spring(4090, 510);

    totalCoinsEl.textContent = level.coins.length;
  }

  function resetRun(full=false) {
    player.x = playerStart.x;
    player.y = playerStart.y;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
    player.inv = 90;
    camera.x = 0;
    particles = [];
    gameTime = 300;
    lastSecond = performance.now();
    if (full) {
      score = 0;
      coinsGot = 0;
      lives = 3;
      buildLevel();
    } else {
      level.enemies.forEach(e => { e.alive = true; e.deadTimer = 0; });
    }
    updateUI();
  }

  function showMessage(title, text) {
    msgTitle.textContent = title;
    msgText.textContent = text;
    message.style.display = "block";
  }
  function hideMessage() {
    message.style.display = "none";
  }

  function startGame() {
    resetRun(true);
    state = "playing";
    hideMessage();
  }

  function updateUI() {
    scoreEl.textContent = score;
    coinsEl.textContent = coinsGot;
    livesEl.textContent = lives;
    timeEl.textContent = Math.max(0, gameTime);
  }

  function overlap(a,b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function collideAxis(entity, axis) {
    for (const p of level.platforms) {
      if (overlap(entity, p)) {
        if (axis === "x") {
          if (entity.vx > 0) entity.x = p.x - entity.w;
          else if (entity.vx < 0) entity.x = p.x + p.w;
          entity.vx = 0;
        } else {
          if (entity.vy > 0) {
            entity.y = p.y - entity.h;
            entity.vy = 0;
            entity.grounded = true;
          } else if (entity.vy < 0) {
            entity.y = p.y + p.h;
            entity.vy = 0;
            bumpBlock(p);
          }
        }
      }
    }
  }

  function bumpBlock(p) {
    if (p.type === "brick" && Math.random() < 0.35) {
      score += 10;
      makeParticles(player.x + player.w/2, p.y, "#ffd34d", 8);
    }
  }

  function makeParticles(x,y,color,n=10) {
    for (let i=0;i<n;i++) {
      particles.push({
        x,y,
        vx:(Math.random()*2-1)*5,
        vy:(Math.random()*2-1)*5-2,
        life:30+Math.random()*25,
        color,
        size:3+Math.random()*5
      });
    }
  }

  function hurtPlayer() {
    if (player.inv > 0) return;
    lives--;
    updateUI();
    makeParticles(player.x + player.w/2, player.y + player.h/2, "#ff3d4a", 18);
    if (lives <= 0) {
      state = "gameover";
      showMessage("Game Over", "Final score: " + score + ". Press Enter or Tap to restart.");
    } else {
      player.x = Math.max(50, player.x - 220);
      player.y = 180;
      player.vx = 0;
      player.vy = 0;
      player.inv = 130;
    }
  }

  function updatePlayer() {
    if (keys.left) {
      player.vx -= MOVE;
      player.facing = -1;
    }
    if (keys.right) {
      player.vx += MOVE;
      player.facing = 1;
    }
    if (!keys.left && !keys.right) player.vx *= FRICTION;
    player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

    if (keys.jump && player.grounded) {
      player.vy = -JUMP;
      player.grounded = false;
      makeParticles(player.x + player.w/2, player.y + player.h, "#ffffff", 5);
    }

    player.vy += GRAVITY;
    if (player.vy > 22) player.vy = 22;

    player.grounded = false;

    player.x += player.vx;
    collideAxis(player, "x");

    player.y += player.vy;
    collideAxis(player, "y");

    player.x = Math.max(0, Math.min(level.width - player.w, player.x));

    if (player.y > H + 220) hurtPlayer();

    if (player.inv > 0) player.inv--;

    for (const s of level.springs) {
      if (overlap(player, s) && player.vy >= 0) {
        player.y = s.y - player.h;
        player.vy = -24;
        player.grounded = false;
        s.active = 12;
        score += 20;
        makeParticles(s.x+s.w/2, s.y, "#fb4dd8", 12);
      }
      if (s.active > 0) s.active--;
    }

    for (const c of level.coins) {
      if (!c.taken) {
        const dx = (player.x+player.w/2) - c.x;
        const dy = (player.y+player.h/2) - c.y;
        if (Math.sqrt(dx*dx+dy*dy) < c.r + 24) {
          c.taken = true;
          coinsGot++;
          score += 100;
          if (coinsGot % 20 === 0) lives++;
          makeParticles(c.x,c.y,"#ffd34d",10);
          updateUI();
        }
      }
    }

    for (const e of level.enemies) {
      if (!e.alive) continue;
      if (overlap(player, e)) {
        const fromTop = player.vy > 0 && player.y + player.h - e.y < 22;
        if (fromTop) {
          e.alive = false;
          e.deadTimer = 35;
          player.vy = -12;
          score += 250;
          makeParticles(e.x+e.w/2, e.y, "#7b4b2a", 12);
          updateUI();
        } else {
          hurtPlayer();
        }
      }
    }

    if (overlap(player, level.flag)) {
      state = "win";
      score += gameTime * 10 + coinsGot * 50;
      updateUI();
      showMessage("You Win!", "Score: " + score + ". Coins: " + coinsGot + "/" + level.coins.length + ". Press Enter or Tap to play again.");
    }
  }

  function updateEnemies() {
    for (const e of level.enemies) {
      if (!e.alive) {
        if (e.deadTimer > 0) e.deadTimer--;
        continue;
      }
      e.x += e.vx;
      if (e.x < e.minX || e.x + e.w > e.maxX) e.vx *= -1;
      e.vy = (e.vy || 0) + GRAVITY;
      e.y += e.vy;
      for (const p of level.platforms) {
        if (overlap(e,p) && e.vy > 0) {
          e.y = p.y - e.h;
          e.vy = 0;
        }
      }
    }
  }

  function updateParticles() {
    for (let i=particles.length-1;i>=0;i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.life--;
      if (p.life <= 0) particles.splice(i,1);
    }
  }

  function updateTime(now) {
    if (now - lastSecond >= 1000) {
      lastSecond = now;
      gameTime--;
      if (gameTime <= 0) hurtPlayer();
      updateUI();
    }
  }

  function updateCamera() {
    camera.x = player.x + player.w/2 - W*0.42;
    camera.x = Math.max(0, Math.min(level.width - W, camera.x));
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#53c7ff");
    g.addColorStop(.58,"#9ee5ff");
    g.addColorStop(.581,"#69c957");
    g.addColorStop(1,"#49a93e");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(-camera.x*0.25,0);
    drawCloud(160,105,1.2);
    drawCloud(720,78,0.9);
    drawCloud(1280,132,1.1);
    drawCloud(1880,80,1);
    drawCloud(2550,120,1.2);
    drawCloud(3300,90,0.95);
    drawCloud(4100,118,1.25);
    drawCloud(4820,82,1);
    ctx.restore();

    ctx.save();
    ctx.translate(-camera.x*0.45,0);
    for (let x=-200;x<level.width;x+=420) {
      ctx.fillStyle = "#3fb36b";
      ctx.beginPath();
      ctx.moveTo(x,532);
      ctx.lineTo(x+210,260);
      ctx.lineTo(x+430,532);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#56c97b";
      ctx.beginPath();
      ctx.moveTo(x+210,260);
      ctx.lineTo(x+430,532);
      ctx.lineTo(x+260,532);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCloud(x,y,s) {
    ctx.fillStyle = "rgba(255,255,255,.88)";
    ctx.beginPath();
    ctx.arc(x,y,28*s,0,Math.PI*2);
    ctx.arc(x+31*s,y-15*s,34*s,0,Math.PI*2);
    ctx.arc(x+70*s,y,31*s,0,Math.PI*2);
    ctx.arc(x+38*s,y+16*s,31*s,0,Math.PI*2);
    ctx.fill();
  }

  function drawPlatforms() {
    for (const p of level.platforms) {
      const x = Math.floor(p.x - camera.x), y = p.y;
      if (x + p.w < -50 || x > W + 50) continue;

      if (p.type === "brick") {
        ctx.fillStyle = "#b86735";
        ctx.fillRect(x,y,p.w,p.h);
        ctx.strokeStyle = "#6f351d";
        ctx.lineWidth = 3;
        for (let tx=x; tx<x+p.w; tx+=44) {
          ctx.strokeRect(tx,y,44,p.h);
          ctx.beginPath();
          ctx.moveTo(tx,y+p.h/2);
          ctx.lineTo(tx+44,y+p.h/2);
          ctx.stroke();
        }
      } else if (p.type === "pipe") {
        ctx.fillStyle = "#19a947";
        ctx.fillRect(x+8,y,p.w-16,p.h);
        ctx.fillStyle = "#27d45b";
        ctx.fillRect(x,y,p.w,22);
        ctx.fillStyle = "rgba(255,255,255,.25)";
        ctx.fillRect(x+14,y+5,12,p.h-10);
        ctx.strokeStyle = "#087b31";
        ctx.lineWidth = 4;
        ctx.strokeRect(x,y,p.w,22);
        ctx.strokeRect(x+8,y,p.w-16,p.h);
      } else {
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(x,y,p.w,p.h);
        ctx.fillStyle = "#42bd42";
        ctx.fillRect(x,y,p.w,16);
        ctx.fillStyle = "#2a8f2a";
        for (let tx=x; tx<x+p.w; tx+=TILE) {
          ctx.fillRect(tx,y+16,2,p.h-16);
          ctx.fillRect(tx,y+p.h-2,TILE,2);
        }
      }
    }
  }

  function drawCoins() {
    for (const c of level.coins) {
      if (c.taken) continue;
      const x = c.x - camera.x, y = c.y + Math.sin(Date.now()/250+c.float)*4;
      if (x < -40 || x > W+40) continue;
      ctx.fillStyle = "#ffd34d";
      ctx.beginPath();
      ctx.ellipse(x,y,11,15,0,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "#b97a00";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "#fff2a6";
      ctx.fillRect(x-3,y-9,4,18);
    }
  }

  function drawEnemies() {
    for (const e of level.enemies) {
      if (!e.alive && e.deadTimer <= 0) continue;
      const x = e.x - camera.x, y = e.y;
      if (x < -60 || x > W+60) continue;

      if (!e.alive) {
        ctx.fillStyle = "#6b3d23";
        ctx.fillRect(x,y+22,e.w,12);
        continue;
      }

      ctx.fillStyle = "#8b4b25";
      ctx.beginPath();
      ctx.roundRect(x,y,e.w,e.h,10);
      ctx.fill();
      ctx.fillStyle = "#5f2f18";
      ctx.fillRect(x+5,y+26,9,10);
      ctx.fillRect(x+24,y+26,9,10);
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(x+11,y+12,6,0,Math.PI*2);
      ctx.arc(x+27,y+12,6,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(x+12,y+13,2.5,0,Math.PI*2);
      ctx.arc(x+26,y+13,2.5,0,Math.PI*2);
      ctx.fill();
    }
  }

  function drawSprings() {
    for (const s of level.springs) {
      const x = s.x - camera.x, y = s.y + (s.active ? 8 : 0);
      if (x < -50 || x > W+50) continue;
      ctx.fillStyle = "#fa48d0";
      ctx.fillRect(x,y,s.w,8);
      ctx.fillStyle = "#ddddff";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#4444aa";
      ctx.beginPath();
      ctx.moveTo(x+6,y+8);
      ctx.lineTo(x+30,y+15);
      ctx.lineTo(x+6,y+22);
      ctx.stroke();
      ctx.fillStyle = "#fa48d0";
      ctx.fillRect(x,y+18,s.w,8);
    }
  }

  function drawFlag() {
    const f = level.flag;
    const x = f.x - camera.x;
    ctx.fillStyle = "#f8f8f8";
    ctx.fillRect(x+8,f.y,8,f.h+52);
    ctx.fillStyle = "#ff334e";
    ctx.beginPath();
    ctx.moveTo(x+16,f.y+8);
    ctx.lineTo(x+112,f.y+45);
    ctx.lineTo(x+16,f.y+82);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath();
    ctx.arc(x+12,f.y,14,0,Math.PI*2);
    ctx.fill();
  }

  function drawPlayer() {
    const x = player.x - camera.x, y = player.y;
    if (player.inv > 0 && Math.floor(player.inv/6)%2===0) return;

    ctx.save();
    ctx.translate(x + player.w/2, y + player.h/2);
    ctx.scale(player.facing,1);
    ctx.translate(-player.w/2, -player.h/2);

    ctx.fillStyle = "#e6293a";
    ctx.fillRect(3,0,28,15);
    ctx.fillStyle = "#ffcc8d";
    ctx.fillRect(6,12,23,15);
    ctx.fillStyle = "#2f61d5";
    ctx.fillRect(5,27,24,18);
    ctx.fillStyle = "#1f3f9c";
    ctx.fillRect(4,42,10,8);
    ctx.fillRect(20,42,10,8);
    ctx.fillStyle = "#e6293a";
    ctx.fillRect(1,25,8,15);
    ctx.fillRect(25,25,8,15);
    ctx.fillStyle = "#1b1b1b";
    ctx.fillRect(22,17,4,4);
    ctx.fillStyle = "#7a3218";
    ctx.fillRect(6,21,20,3);
    ctx.fillStyle = "#ffd34d";
    ctx.fillRect(10,31,5,5);
    ctx.fillRect(20,31,5,5);

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life/50);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-camera.x, p.y, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  function render() {
    drawSky();
    drawFlag();
    drawPlatforms();
    drawSprings();
    drawCoins();
    drawEnemies();
    drawPlayer();
    drawParticles();
  }

  function loop(now) {
    if (state === "playing") {
      updateTime(now);
      updatePlayer();
      updateEnemies();
      updateParticles();
      updateCamera();
      updateUI();
    } else {
      updateParticles();
    }
    render();
    requestAnimationFrame(loop);
  }

  function setKey(code, down) {
    if (code === "ArrowLeft" || code === "KeyA") keys.left = down;
    if (code === "ArrowRight" || code === "KeyD") keys.right = down;
    if (code === "ArrowUp" || code === "KeyW" || code === "Space") keys.jump = down;
  }

  window.addEventListener("keydown", e => {
    if (["ArrowLeft","ArrowRight","ArrowUp","KeyA","KeyD","KeyW","Space"].includes(e.code)) e.preventDefault();
    if (e.code === "Enter") {
      if (state !== "playing") startGame();
    }
    setKey(e.code, true);
  });
  window.addEventListener("keyup", e => setKey(e.code, false));

  function bindTouch(id, prop) {
    const el = document.getElementById(id);
    const on = e => { e.preventDefault(); keys[prop] = true; if (state !== "playing") startGame(); };
    const off = e => { e.preventDefault(); keys[prop] = false; };
    el.addEventListener("touchstart", on, {passive:false});
    el.addEventListener("touchend", off, {passive:false});
    el.addEventListener("touchcancel", off, {passive:false});
    el.addEventListener("mousedown", on);
    window.addEventListener("mouseup", off);
  }
  bindTouch("leftBtn","left");
  bindTouch("rightBtn","right");
  bindTouch("jumpBtn","jump");

  message.addEventListener("click", () => { if (state !== "playing") startGame(); });
  canvas.addEventListener("click", () => { if (state !== "playing") startGame(); });

  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      this.beginPath();
      this.moveTo(x+r,y);
      this.lineTo(x+w-r,y);
      this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r);
      this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r);
      this.quadraticCurveTo(x,y,x+r,y);
      this.closePath();
      return this;
    };
  }

  buildLevel();
  updateUI();
  showMessage("Super Platform Adventure", "Run, jump, collect coins, stomp enemies, and reach the flag!");
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
