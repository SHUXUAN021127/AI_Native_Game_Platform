<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #23395d, #0b1020 70%);
    color: white;
    overflow: hidden;
  }

  .game-wrap {
    width: min(94vw, 560px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  h1 {
    margin: 0;
    font-size: clamp(34px, 8vw, 56px);
    letter-spacing: 4px;
    color: #7cff8b;
    text-shadow: 0 0 18px rgba(124, 255, 139, 0.45);
  }

  .panel {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
  }

  .stat {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .label {
    font-size: 12px;
    color: #aeb8d0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .value {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
  }

  button {
    border: none;
    cursor: pointer;
    color: #07110a;
    background: linear-gradient(135deg, #7cff8b, #35d86a);
    padding: 12px 18px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 800;
    box-shadow: 0 6px 18px rgba(80, 255, 120, 0.25);
  }

  button:active {
    transform: scale(0.96);
  }

  .canvas-holder {
    position: relative;
    width: min(94vw, 560px);
    aspect-ratio: 1 / 1;
    border-radius: 22px;
    overflow: hidden;
    background: #0f1b2e;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 25px 60px rgba(0,0,0,0.45);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #101a2b;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: rgba(5, 9, 20, 0.62);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .message {
    max-width: 380px;
    padding: 24px;
    border-radius: 22px;
    background: rgba(17, 27, 48, 0.92);
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .message h2 {
    margin: 0 0 8px;
    font-size: 34px;
    color: #7cff8b;
  }

  .message p {
    margin: 8px 0 18px;
    color: #d7dcef;
    line-height: 1.45;
  }

  .controls {
    display: none;
    grid-template-columns: 70px 70px 70px;
    grid-template-rows: 60px 60px;
    gap: 9px;
    justify-content: center;
    align-items: center;
    margin-top: 2px;
  }

  .ctrl {
    width: 70px;
    height: 60px;
    padding: 0;
    border-radius: 16px;
    font-size: 24px;
    color: white;
    background: rgba(255,255,255,0.11);
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow: none;
  }

  .ctrl.up { grid-column: 2; grid-row: 1; }
  .ctrl.left { grid-column: 1; grid-row: 2; }
  .ctrl.down { grid-column: 2; grid-row: 2; }
  .ctrl.right { grid-column: 3; grid-row: 2; }

  .hint {
    margin: 0;
    color: #aeb8d0;
    font-size: 14px;
    text-align: center;
  }

  @media (hover: none), (max-width: 700px) {
    .controls {
      display: grid;
    }
    .hint {
      display: none;
    }
  }
</style>
</head>
<body>
  <div class="game-wrap">
    <h1>SNAKE</h1>

    <div class="panel">
      <div class="stat">
        <span class="label">Score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">Best</span>
        <span class="value" id="best">0</span>
      </div>
      <button id="restartBtn">Restart</button>
    </div>

    <div class="canvas-holder">
      <canvas id="game" width="560" height="560"></canvas>
      <div class="overlay show" id="overlay">
        <div class="message">
          <h2 id="overlayTitle">Ready?</h2>
          <p id="overlayText">Use arrow keys, WASD, or swipe to move. Eat the apples and avoid crashing.</p>
          <button id="startBtn">Start Game</button>
        </div>
      </div>
    </div>

    <p class="hint">Move with Arrow Keys or WASD. Press Space to pause/resume.</p>

    <div class="controls" aria-label="Touch controls">
      <button class="ctrl up" data-dir="up">▲</button>
      <button class="ctrl left" data-dir="left">◀</button>
      <button class="ctrl down" data-dir="down">▼</button>
      <button class="ctrl right" data-dir="right">▶</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayText = document.getElementById("overlayText");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");

  const grid = 20;
  const cells = canvas.width / grid;

  let snake;
  let food;
  let direction;
  let nextDirection;
  let score;
  let best = Number(localStorage.getItem("snakeBestScore") || 0);
  let running = false;
  let paused = false;
  let gameOver = false;
  let lastTime = 0;
  let tickRate = 115;
  let accumulator = 0;

  bestEl.textContent = best;

  function reset() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    tickRate = 115;
    accumulator = 0;
    running = false;
    paused = false;
    gameOver = false;
    scoreEl.textContent = score;
    placeFood();
    draw();
  }

  function start() {
    if (gameOver) reset();
    running = true;
    paused = false;
    gameOver = false;
    hideOverlay();
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function restart() {
    reset();
    start();
  }

  function pauseToggle() {
    if (gameOver) return;
    if (!running) {
      start();
      return;
    }
    paused = !paused;
    if (paused) {
      showOverlay("Paused", "Press Space or tap Resume to continue.", "Resume");
    } else {
      hideOverlay();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }
  }

  function showOverlay(title, text, button) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = button;
    overlay.classList.add("show");
  }

  function hideOverlay() {
    overlay.classList.remove("show");
  }

  function placeFood() {
    do {
      food = {
        x: Math.floor(Math.random() * cells),
        y: Math.floor(Math.random() * cells)
      };
    } while (snake.some(part => part.x === food.x && part.y === food.y));
  }

  function setDirection(dir) {
    const dirs = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    const chosen = dirs[dir];
    if (!chosen) return;

    if (chosen.x === -direction.x && chosen.y === -direction.y) return;
    nextDirection = chosen;

    if (!running && !gameOver) start();
  }

  function update() {
    direction = nextDirection;

    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    if (
      head.x < 0 ||
      head.y < 0 ||
      head.x >= cells ||
      head.y >= cells ||
      snake.some(part => part.x === head.x && part.y === head.y)
    ) {
      endGame();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;

      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem("snakeBestScore", best);
      }

      tickRate = Math.max(62, tickRate - 2);
      placeFood();
    } else {
      snake.pop();
    }
  }

  function endGame() {
    running = false;
    gameOver = true;
    showOverlay("Game Over", "Your score was " + score + ". Try again and beat your best!", "Play Again");
  }

  function drawBoard() {
    ctx.fillStyle = "#101a2b";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < cells; y++) {
      for (let x = 0; x < cells; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? "#13223a" : "#101d32";
        ctx.fillRect(x * grid, y * grid, grid, grid);
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }

  function drawFood() {
    const x = food.x * grid;
    const y = food.y * grid;

    ctx.fillStyle = "#ff4b5c";
    ctx.beginPath();
    ctx.arc(x + grid / 2, y + grid / 2 + 1, grid * 0.38, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ff8994";
    ctx.beginPath();
    ctx.arc(x + grid * 0.38, y + grid * 0.38, grid * 0.11, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#45d46a";
    ctx.beginPath();
    ctx.ellipse(x + grid * 0.62, y + grid * 0.18, grid * 0.18, grid * 0.09, -0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSnake() {
    snake.forEach((part, i) => {
      const x = part.x * grid + 2;
      const y = part.y * grid + 2;
      const size = grid - 4;

      if (i === 0) {
        ctx.fillStyle = "#8dff95";
      } else {
        const shade = Math.max(120, 230 - i * 4);
        ctx.fillStyle = "rgb(70," + shade + ",105)";
      }

      roundRect(x, y, size, size, 6);

      if (i === 0) {
        ctx.fillStyle = "#07110a";

        const eyeOffsetX = direction.x !== 0 ? direction.x * 3 : 0;
        const eyeOffsetY = direction.y !== 0 ? direction.y * 3 : 0;

        ctx.beginPath();
        ctx.arc(x + size * 0.35 + eyeOffsetX, y + size * 0.35 + eyeOffsetY, 2.2, 0, Math.PI * 2);
        ctx.arc(x + size * 0.65 + eyeOffsetX, y + size * 0.35 + eyeOffsetY, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  function draw() {
    drawBoard();
    drawFood();
    drawSnake();
  }

  function loop(time) {
    if (!running || paused) return;

    const delta = time - lastTime;
    lastTime = time;
    accumulator += delta;

    while (accumulator >= tickRate) {
      update();
      accumulator -= tickRate;
      if (gameOver) break;
    }

    draw();

    if (running && !paused) {
      requestAnimationFrame(loop);
    }
  }

  document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
      e.preventDefault();
    }

    if (key === "arrowup" || key === "w") setDirection("up");
    else if (key === "arrowdown" || key === "s") setDirection("down");
    else if (key === "arrowleft" || key === "a") setDirection("left");
    else if (key === "arrowright" || key === "d") setDirection("right");
    else if (key === " ") pauseToggle();
  });

  document.querySelectorAll(".ctrl").forEach(btn => {
    btn.addEventListener("click", () => setDirection(btn.dataset.dir));
  });

  let touchStartX = 0;
  let touchStartY = 0;

  canvas.addEventListener("touchstart", (e) => {
    const touch = e.changedTouches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
  }, { passive: true });

  canvas.addEventListener("touchend", (e) => {
    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;

    if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) {
      if (!running || paused || gameOver) start();
      return;
    }

    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? "right" : "left");
    } else {
      setDirection(dy > 0 ? "down" : "up");
    }
  }, { passive: true });

  startBtn.addEventListener("click", () => {
    if (paused) {
      paused = false;
      hideOverlay();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    } else {
      start();
    }
  });

  restartBtn.addEventListener("click", restart);

  reset();
})();
</script>
</body>
</html>
