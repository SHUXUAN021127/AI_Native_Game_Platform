<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横移消消乐</title>
<style>
* {
  box-sizing: border-box;
  user-select: none;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Microsoft YaHei", Arial, sans-serif;
  background: radial-gradient(circle at top, #26385f, #0b1020 70%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.game-wrap {
  width: min(96vw, 760px);
  display: grid;
  grid-template-columns: 1fr 230px;
  gap: 18px;
  padding: 18px;
}

.board-panel {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

#board {
  width: 100%;
  aspect-ratio: 10 / 16;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(16, 1fr);
  gap: 4px;
  background: rgba(0,0,0,0.22);
  padding: 6px;
  border-radius: 14px;
  overflow: hidden;
}

.cell {
  border-radius: 7px;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.05);
  position: relative;
  transition: transform .12s, background .12s, box-shadow .12s;
}

.cell.filled {
  cursor: pointer;
  border-color: rgba(255,255,255,0.28);
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.28), inset 0 -4px 0 rgba(0,0,0,0.2);
}

.cell.filled:hover {
  transform: scale(1.06);
  z-index: 3;
}

.cell.selected {
  outline: 3px solid #fff;
  outline-offset: -3px;
  z-index: 4;
  animation: pulse .7s infinite alternate;
}

@keyframes pulse {
  from { filter: brightness(1); }
  to { filter: brightness(1.35); }
}

.c0 { background: linear-gradient(145deg, #ff5b78, #c9184a); }
.c1 { background: linear-gradient(145deg, #4ddcff, #0077b6); }
.c2 { background: linear-gradient(145deg, #ffe66d, #f77f00); }
.c3 { background: linear-gradient(145deg, #80ed99, #2d6a4f); }
.c4 { background: linear-gradient(145deg, #c77dff, #7b2cbf); }
.c5 { background: linear-gradient(145deg, #ffafcc, #ff006e); }

.side {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

h1 {
  margin: 0 0 14px;
  font-size: 26px;
  letter-spacing: 1px;
}

.stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 9px 0;
  padding: 9px 11px;
  border-radius: 10px;
  background: rgba(0,0,0,0.22);
  font-size: 15px;
}

.stat b {
  font-size: 20px;
  color: #ffe66d;
}

.help {
  margin: 14px 0;
  line-height: 1.65;
  font-size: 13px;
  color: rgba(255,255,255,0.78);
  background: rgba(0,0,0,0.18);
  padding: 12px;
  border-radius: 12px;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  border: none;
  border-radius: 12px;
  padding: 12px 8px;
  background: linear-gradient(145deg, #ffffff, #cfd8ff);
  color: #111827;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 0 rgba(0,0,0,0.28);
  transition: transform .08s, box-shadow .08s, filter .12s;
}

button:hover {
  filter: brightness(1.08);
}

button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 rgba(0,0,0,0.28);
}

button.danger {
  grid-column: span 2;
  background: linear-gradient(145deg, #ffb3c1, #ff4d6d);
  color: #fff;
}

button.secondary {
  grid-column: span 2;
  background: linear-gradient(145deg, #caf0f8, #48cae4);
}

.status {
  margin-top: 14px;
  min-height: 40px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(0,0,0,0.24);
  color: #a7f3d0;
  font-size: 14px;
  line-height: 1.4;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.68);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

.overlay.show {
  display: flex;
}

.dialog {
  width: min(90vw, 390px);
  padding: 28px;
  border-radius: 22px;
  background: linear-gradient(145deg, #1f2a44, #0f172a);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  box-shadow: 0 25px 70px rgba(0,0,0,0.55);
}

.dialog h2 {
  margin: 0 0 12px;
  font-size: 30px;
}

.dialog p {
  color: rgba(255,255,255,0.82);
}

@media (max-width: 720px) {
  .game-wrap {
    grid-template-columns: 1fr;
    width: min(96vw, 480px);
  }

  .side {
    order: -1;
  }

  h1 {
    font-size: 22px;
  }
}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="board-panel">
    <div id="board"></div>
  </div>

  <div class="side">
    <h1>横移消消乐</h1>

    <div class="stat"><span>分数</span><b id="score">0</b></div>
    <div class="stat"><span>步数</span><b id="moves">0</b></div>
    <div class="stat"><span>消除</span><b id="cleared">0</b></div>
    <div class="stat"><span>最高分</span><b id="best">0</b></div>

    <div class="help">
      规则：每个方块长度为 1×1 到 1×4，只能左右横向移动。<br>
      每成功移动一次，所有已有方块上升一行，并在底部生成新一行。<br>
      横向或纵向连续 3 个及以上同色格子会消除。方块顶出棋盘即游戏结束。
    </div>

    <div class="controls">
      <button id="leftBtn">← 左移</button>
      <button id="rightBtn">右移 →</button>
      <button class="secondary" id="riseBtn">生成一行</button>
      <button class="danger" id="restartBtn">重新开始</button>
    </div>

    <div class="status" id="status">点击棋盘上的方块，然后使用按钮或键盘 ← → 移动。</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2>游戏结束</h2>
    <p id="finalText">你的分数：0</p>
    <button id="againBtn">再玩一次</button>
  </div>
</div>

<script>
const ROWS = 16;
const COLS = 10;
const COLORS = 6;

let blocks = [];
let nextId = 1;
let selectedId = null;
let score = 0;
let moves = 0;
let cleared = 0;
let gameOver = false;
let best = Number(localStorage.getItem("horizontal_match_best") || 0);

const board = document.getElementById("board");
const scoreEl = document.getElementById("score");
const movesEl = document.getElementById("moves");
const clearedEl = document.getElementById("cleared");
const bestEl = document.getElementById("best");
const statusEl = document.getElementById("status");
const overlay = document.getElementById("overlay");
const finalText = document.getElementById("finalText");

function rand(n) {
  return Math.floor(Math.random() * n);
}

function setStatus(text) {
  statusEl.textContent = text;
}

function makeBlock(row, col, len, color) {
  return {
    id: nextId++,
    row,
    col,
    len,
    color
  };
}

function createGrid() {
  board.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.row = r;
      cell.dataset.col = c;
      board.appendChild(cell);
    }
  }
}

function getMatrix() {
  const matrix = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  for (const b of blocks) {
    for (let i = 0; i < b.len; i++) {
      const c = b.col + i;
      if (b.row >= 0 && b.row < ROWS && c >= 0 && c < COLS) {
        matrix[b.row][c] = {
          id: b.id,
          color: b.color
        };
      }
    }
  }
  return matrix;
}

function getBlock(id) {
  return blocks.find(b => b.id === id);
}

function render() {
  const matrix = getMatrix();
  const cells = board.children;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = cells[r * COLS + c];
      el.className = "cell";
      el.dataset.id = "";
      const data = matrix[r][c];
      if (data) {
        el.classList.add("filled", "c" + data.color);
        el.dataset.id = data.id;
        if (data.id === selectedId) {
          el.classList.add("selected");
        }
      }
    }
  }

  scoreEl.textContent = score;
  movesEl.textContent = moves;
  clearedEl.textContent = cleared;
  bestEl.textContent = best;
}

function canMove(block, dir) {
  const newCol = block.col + dir;
  if (newCol < 0 || newCol + block.len > COLS) return false;

  const matrix = getMatrix();
  for (let i = 0; i < block.len; i++) {
    const c = newCol + i;
    const data = matrix[block.row][c];
    if (data && data.id !== block.id) {
      return false;
    }
  }
  return true;
}

function moveSelected(dir) {
  if (gameOver) return;
  if (!selectedId) {
    setStatus("请先点击选择一个方块。");
    return;
  }

  const block = getBlock(selectedId);
  if (!block) {
    selectedId = null;
    render();
    return;
  }

  if (!canMove(block, dir)) {
    setStatus("该方向被挡住或超出边界，无法移动。");
    return;
  }

  block.col += dir;
  moves++;
  score += 1;

  const before = cleared;
  resolveMatches();

  if (cleared > before) {
    setStatus("移动成功，并触发消除！");
  } else {
    setStatus("移动成功，棋盘上升一行。");
  }

  addRow();
  resolveMatches();
  updateBest();
  render();
}

function addRow() {
  if (gameOver) return;

  for (const b of blocks) {
    if (b.row === 0) {
      endGame();
      return;
    }
  }

  for (const b of blocks) {
    b.row -= 1;
  }

  const row = ROWS - 1;
  let col = 0;

  while (col < COLS) {
    if (Math.random() < 0.27) {
      col++;
      continue;
    }

    const maxLen = Math.min(4, COLS - col);
    let len = 1 + rand(maxLen);

    if (col + len > COLS) len = COLS - col;

    const color = rand(COLORS);
    blocks.push(makeBlock(row, col, len, color));

    col += len;

    if (Math.random() < 0.35) col++;
  }

  selectedId = selectedId && getBlock(selectedId) ? selectedId : null;
}

function resolveMatches() {
  let combo = 1;
  let any = false;

  while (true) {
    const matrix = getMatrix();
    const marked = new Set();

    for (let r = 0; r < ROWS; r++) {
      let c = 0;
      while (c < COLS) {
        if (!matrix[r][c]) {
          c++;
          continue;
        }

        const color = matrix[r][c].color;
        let start = c;
        while (c < COLS && matrix[r][c] && matrix[r][c].color === color) {
          c++;
        }

        if (c - start >= 3) {
          for (let x = start; x < c; x++) {
            marked.add(r + "," + x);
          }
        }
      }
    }

    for (let c = 0; c < COLS; c++) {
      let r = 0;
      while (r < ROWS) {
        if (!matrix[r][c]) {
          r++;
          continue;
        }

        const color = matrix[r][c].color;
        let start = r;
        while (r < ROWS && matrix[r][c] && matrix[r][c].color === color) {
          r++;
        }

        if (r - start >= 3) {
          for (let y = start; y < r; y++) {
            marked.add(y + "," + c);
          }
        }
      }
    }

    if (marked.size === 0) break;

    const removeIds = new Set();

    marked.forEach(key => {
      const parts = key.split(",");
      const r = Number(parts[0]);
      const c = Number(parts[1]);
      if (matrix[r][c]) {
        removeIds.add(matrix[r][c].id);
      }
    });

    let removedCells = 0;
    blocks = blocks.filter(b => {
      if (removeIds.has(b.id)) {
        removedCells += b.len;
        return false;
      }
      return true;
    });

    if (removeIds.has(selectedId)) {
      selectedId = null;
    }

    cleared += removedCells;
    score += removedCells * 10 * combo;
    combo++;
    any = true;
  }

  if (any) {
    updateBest();
  }
}

function updateBest() {
  if (score > best) {
    best = score;
    localStorage.setItem("horizontal_match_best", String(best));
  }
}

function endGame() {
  gameOver = true;
  selectedId = null;
  updateBest();
  render();
  finalText.textContent = "你的分数：" + score + "，共消除 " + cleared + " 格。";
  overlay.classList.add("show");
}

function restart() {
  blocks = [];
  nextId = 1;
  selectedId = null;
  score = 0;
  moves = 0;
  cleared = 0;
  gameOver = false;
  overlay.classList.remove("show");

  for (let i = 0; i < 5; i++) {
    addRow();
  }

  resolveMatches();
  setStatus("点击棋盘上的方块，然后使用按钮或键盘 ← → 移动。");
  render();
}

board.addEventListener("click", e => {
  if (gameOver) return;

  const cell = e.target.closest(".cell");
  if (!cell) return;

  const id = Number(cell.dataset.id || 0);

  if (id) {
    selectedId = id;
    const b = getBlock(id);
    setStatus("已选择长度 " + b.len + " 的方块，只能左右移动。");
  } else {
    selectedId = null;
    setStatus("已取消选择。");
  }

  render();
});

document.getElementById("leftBtn").addEventListener("click", () => moveSelected(-1));
document.getElementById("rightBtn").addEventListener("click", () => moveSelected(1));

document.getElementById("riseBtn").addEventListener("click", () => {
  if (gameOver) return;
  moves++;
  addRow();
  resolveMatches();
  updateBest();
  setStatus("手动生成了一行，所有方块上升。");
  render();
});

document.getElementById("restartBtn").addEventListener("click", restart);
document.getElementById("againBtn").addEventListener("click", restart);

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
    moveSelected(-1);
  }

  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
    moveSelected(1);
  }

  if (e.key === "r" || e.key === "R") {
    restart();
  }
});

createGrid();
bestEl.textContent = best;
restart();
</script>
</body>
</html>
