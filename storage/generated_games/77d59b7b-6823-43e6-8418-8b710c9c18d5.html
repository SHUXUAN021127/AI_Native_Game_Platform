<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Angry Birds Style HTML5 Game</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #7ed6ff;
  }
  #wrap {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(#72d7ff, #dff8ff 65%, #7cc35b 66%);
  }
  canvas {
    width: min(100vw, 1200px);
    height: min(100vh, 675px);
    max-width: 1200px;
    max-height: 675px;
    display: block;
    border: 4px solid rgba(0,0,0,.22);
    border-radius: 14px;
    background: #84ddff;
    box-shadow: 0 16px 40px rgba(0,0,0,.25);
    touch-action: none;
  }
  #hud {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: rgba(255,255,255,.72);
    border: 2px solid rgba(0,0,0,.18);
    border-radius: 16px;
    box-shadow: 0 8px 18px rgba(0,0,0,.18);
    font-weight: 900;
    color: #253238;
    user-select: none;
  }
  #hud span {
    min-width: 92px;
    text-align: center;
    padding: 8px 10px;
    background: rgba(255,255,255,.7);
    border-radius: 12px;
  }
  button {
    border: 0;
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(#ff7b3d, #d9431e);
    cursor: pointer;
    box-shadow: inset 0 -3px rgba(0,0,0,.18), 0 3px 0 rgba(0,0,0,.18);
  }
  button:active {
    transform: translateY(2px);
    box-shadow: inset 0 -2px rgba(0,0,0,.18), 0 1px 0 rgba(0,0,0,.18);
  }
  #msg {
    position: fixed;
    left: 50%;
    top: 86px;
    transform: translateX(-50%);
    padding: 12px 18px;
    border-radius: 18px;
    background: rgba(20,30,35,.76);
    color: white;
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
    text-shadow: 0 2px rgba(0,0,0,.25);
  }
  #msg.show { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1200" height="675"></canvas>
</div>
<div id="hud">
  <span id="level">Level 1</span>
  <span id="score">Score 0</span>
  <span id="birds">Birds 5</span>
  <button id="restart">Restart</button>
  <button id="next">Next</button>
</div>
<div id="msg">Pull the bird and release!</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const groundY = 560;
  const sling = { x: 170, y: 460 };
  const gravity = 0.34;

  const $score = document.getElementById("score");
  const $birds = document.getElementById("birds");
  const $level = document.getElementById("level");
  const $msg = document.getElementById("msg");

  let levelIndex = 0;
  let score = 0;
  let birdsLeft = 5;
  let state = "ready";
  let mouse = { x: 0, y: 0, down: false };
  let bird = null;
  let trail = [];
  let pigs = [];
  let blocks = [];
  let settleTimer = 0;
  let messageTimer = 0;
  let confetti = [];

  const levels = [
    {
      birds: 5,
      pigs: [
        { x: 885, y: 525, r: 23, hp: 55 },
        { x: 995, y: 525, r: 23, hp: 55 }
      ],
      blocks: [
        { x: 820, y: 505, w: 28, h: 110, hp: 75 },
        { x: 940, y: 505, w: 28, h: 110, hp: 75 },
        { x: 880, y: 438, w: 165, h: 26, hp: 85 },
        { x: 1000, y: 500, w: 32, h: 120, hp: 80 },
        { x: 1060, y: 525, w: 100, h: 30, hp: 80 }
      ]
    },
    {
      birds: 5,
      pigs: [
        { x: 820, y: 525, r: 22, hp: 60 },
        { x: 940, y: 410, r: 22, hp: 60 },
        { x: 1045, y: 525, r: 24, hp: 70 }
      ],
      blocks: [
        { x: 760, y: 500, w: 30, h: 120, hp: 85 },
        { x: 880, y: 500, w: 30, h: 120, hp: 85 },
        { x: 820, y: 430, w: 160, h: 28, hp: 95 },
        { x: 920, y: 488, w: 28, h: 145, hp: 90 },
        { x: 1010, y: 488, w: 28, h: 145, hp: 90 },
        { x: 965, y: 395, w: 145, h: 28, hp: 95 },
        { x: 1065, y: 510, w: 32, h: 100, hp: 75 }
      ]
    },
    {
      birds: 6,
      pigs: [
        { x: 790, y: 525, r: 22, hp: 65 },
        { x: 905, y: 525, r: 22, hp: 65 },
        { x: 1020, y: 525, r: 22, hp: 65 },
        { x: 960, y: 355, r: 25, hp: 80 }
      ],
      blocks: [
        { x: 735, y: 510, w: 30, h: 100, hp: 85 },
        { x: 845, y: 510, w: 30, h: 100, hp: 85 },
        { x: 790, y: 450, w: 145, h: 26, hp: 95 },
        { x: 875, y: 500, w: 28, h: 120, hp: 90 },
        { x: 990, y: 500, w: 28, h: 120, hp: 90 },
        { x: 932, y: 430, w: 160, h: 28, hp: 100 },
        { x: 935, y: 365, w: 28, h: 105, hp: 90 },
        { x: 1015, y: 365, w: 28, h: 105, hp: 90 },
        { x: 975, y: 305, w: 130, h: 26, hp: 100 },
        { x: 1080, y: 520, w: 90, h: 34, hp: 80 }
      ]
    }
  ];

  function showMsg(t, ms = 1800) {
    $msg.textContent = t;
    $msg.classList.add("show");
    messageTimer = ms;
  }

  function resetLevel(keepScore = false) {
    const lv = levels[levelIndex];
    if (!keepScore) score = 0;
    birdsLeft = lv.birds;
    state = "ready";
    trail = [];
    settleTimer = 0;
    confetti = [];
    pigs = lv.pigs.map(p => ({
      x: p.x, y: p.y, r: p.r, hp: p.hp, maxHp: p.hp,
      vx: 0, vy: 0, alive: true, sleep: 0
    }));
    blocks = lv.blocks.map(b => ({
      x: b.x, y: b.y, w: b.w, h: b.h, hp: b.hp, maxHp: b.hp,
      vx: 0, vy: 0, alive: true, mass: Math.max(1, b.w*b.h/1200)
    }));
    spawnBird();
    updateHUD();
    showMsg("Pull the bird back, aim, and release!");
  }

  function spawnBird() {
    if (birdsLeft <= 0) {
      bird = null;
      state = "lost";
      showMsg("Out of birds! Press Restart.");
      return;
    }
    bird = {
      x: sling.x, y: sling.y, r: 18,
      vx: 0, vy: 0, launched: false,
      color: ["#e9342f","#ffcf30","#36a8ff","#d455ff","#ff7537"][birdsLeft % 5],
      power: birdsLeft % 2 === 0 ? 1.12 : 1
    };
    state = "ready";
    trail = [];
  }

  function updateHUD() {
    $score.textContent = "Score " + score;
    $birds.textContent = "Birds " + birdsLeft;
    $level.textContent = "Level " + (levelIndex + 1);
  }

  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - r.left) * W / r.width,
      y: (t.clientY - r.top) * H / r.height
    };
  }

  function down(e) {
    e.preventDefault();
    const p = pointerPos(e);
    mouse.x = p.x; mouse.y = p.y; mouse.down = true;
    if ((state === "ready" || state === "aiming") && bird) {
      const d = Math.hypot(p.x - bird.x, p.y - bird.y);
      if (d < 55) state = "aiming";
    }
  }

  function move(e) {
    e.preventDefault();
    const p = pointerPos(e);
    mouse.x = p.x; mouse.y = p.y;
    if (state === "aiming" && bird) {
      let dx = p.x - sling.x, dy = p.y - sling.y;
      const max = 95;
      const len = Math.hypot(dx, dy);
      if (len > max) {
        dx = dx / len * max;
        dy = dy / len * max;
      }
      bird.x = sling.x + dx;
      bird.y = sling.y + dy;
    }
  }

  function up(e) {
    e.preventDefault();
    mouse.down = false;
    if (state === "aiming" && bird) {
      const dx = sling.x - bird.x;
      const dy = sling.y - bird.y;
      bird.vx = dx * 0.205 * bird.power;
      bird.vy = dy * 0.205 * bird.power;
      bird.launched = true;
      birdsLeft--;
      updateHUD();
      state = "flying";
      trail = [];
      showMsg("Hit the green pigs!");
    }
  }

  canvas.addEventListener("mousedown", down);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);
  canvas.addEventListener("touchstart", down, { passive:false });
  canvas.addEventListener("touchmove", move, { passive:false });
  window.addEventListener("touchend", up, { passive:false });

  document.getElementById("restart").onclick = () => resetLevel(false);
  document.getElementById("next").onclick = () => {
    levelIndex = (levelIndex + 1) % levels.length;
    resetLevel(false);
  };
  window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "r") resetLevel(false);
    if (e.key.toLowerCase() === "n") {
      levelIndex = (levelIndex + 1) % levels.length;
      resetLevel(false);
    }
  });

  function circleCircle(a,b) {
    const dx = b.x-a.x, dy = b.y-a.y;
    const d = Math.hypot(dx,dy) || 0.001;
    const min = a.r+b.r;
    if (d < min) {
      const nx = dx/d, ny = dy/d;
      const overlap = min-d;
      a.x -= nx*overlap*0.45; a.y -= ny*overlap*0.45;
      b.x += nx*overlap*0.55; b.y += ny*overlap*0.55;
      const rvx = b.vx-a.vx, rvy = b.vy-a.vy;
      const sep = rvx*nx + rvy*ny;
      if (sep < 0) {
        const imp = -(1.25)*sep/2;
        a.vx -= imp*nx; a.vy -= imp*ny;
        b.vx += imp*nx; b.vy += imp*ny;
      }
      return Math.abs(sep) + Math.hypot(a.vx-a.vx,b.vy-a.vy);
    }
    return 0;
  }

  function circleRect(c, r) {
    const left = r.x - r.w/2, right = r.x + r.w/2;
    const top = r.y - r.h/2, bottom = r.y + r.h/2;
    const cx = Math.max(left, Math.min(c.x, right));
    const cy = Math.max(top, Math.min(c.y, bottom));
    let dx = c.x - cx, dy = c.y - cy;
    let dist = Math.hypot(dx,dy);
    if (dist < c.r) {
      if (dist < 0.001) {
        const dl = Math.abs(c.x-left), dr = Math.abs(right-c.x), dt = Math.abs(c.y-top), db = Math.abs(bottom-c.y);
        const m = Math.min(dl,dr,dt,db);
        if (m === dl) { dx = -1; dy = 0; }
        else if (m === dr) { dx = 1; dy = 0; }
        else if (m === dt) { dx = 0; dy = -1; }
        else { dx = 0; dy = 1; }
        dist = 1;
      }
      const nx = dx/dist, ny = dy/dist;
      const overlap = c.r - dist;
      c.x += nx * overlap * 0.7;
      c.y += ny * overlap * 0.7;
      r.x -= nx * overlap * 0.12;
      r.y -= ny * overlap * 0.12;

      const rvx = c.vx - r.vx, rvy = c.vy - r.vy;
      const sep = rvx*nx + rvy*ny;
      if (sep < 0) {
        const invC = 1/1.3, invR = 1/r.mass;
        const imp = -(1.35)*sep/(invC+invR);
        c.vx += nx*imp*invC;
        c.vy += ny*imp*invC;
        r.vx -= nx*imp*invR;
        r.vy -= ny*imp*invR;
      }
      return Math.abs(sep);
    }
    return 0;
  }

  function rectCircle(r, c) {
    return circleRect(c, r);
  }

  function integrateCircle(o) {
    o.vy += gravity;
    o.x += o.vx;
    o.y += o.vy;
    o.vx *= 0.995;
    o.vy *= 0.995;

    if (o.y + o.r > groundY) {
      o.y = groundY - o.r;
      if (Math.abs(o.vy) > 1.3) o.vy *= -0.42;
      else o.vy = 0;
      o.vx *= 0.74;
    }
    if (o.x - o.r < 0) { o.x = o.r; o.vx *= -0.45; }
    if (o.x + o.r > W) { o.x = W-o.r; o.vx *= -0.45; }
  }

  function integrateBlock(b) {
    b.vy += gravity;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.992;
    b.vy *= 0.995;

    if (b.y + b.h/2 > groundY) {
      b.y = groundY - b.h/2;
      if (Math.abs(b.vy) > 1.2) b.vy *= -0.22;
      else b.vy = 0;
      b.vx *= 0.72;
    }
    if (b.x - b.w/2 < 0) { b.x = b.w/2; b.vx *= -0.35; }
    if (b.x + b.w/2 > W) { b.x = W-b.w/2; b.vx *= -0.35; }
  }

  function killPig(p) {
    if (!p.alive) return;
    p.alive = false;
    score += 500;
    for (let i=0;i<18;i++) {
      confetti.push({
        x:p.x,y:p.y,
        vx:(Math.random()-.5)*8,
        vy:(Math.random()-.8)*8,
        life:50+Math.random()*25,
        c:["#75d943","#e8ff75","#54b93c","#fff"][Math.floor(Math.random()*4)]
      });
    }
    updateHUD();
  }

  function update() {
    if (messageTimer > 0) {
      messageTimer -= 16;
      if (messageTimer <= 0) $msg.classList.remove("show");
    }

    confetti.forEach(c => {
      c.vy += 0.18; c.x += c.vx; c.y += c.vy; c.life--;
    });
    confetti = confetti.filter(c => c.life > 0);

    if (state === "flying" || state === "settling") {
      if (bird && bird.launched) {
        trail.push({ x: bird.x, y: bird.y });
        if (trail.length > 32) trail.shift();
        integrateCircle(bird);
      }

      for (const b of blocks) if (b.alive) integrateBlock(b);
      for (const p of pigs) if (p.alive) integrateCircle(p);

      if (bird && bird.launched) {
        for (const b of blocks) if (b.alive) {
          const hit = circleRect(bird, b);
          if (hit > 0) {
            b.hp -= hit * 8 + Math.hypot(bird.vx,bird.vy) * 1.1;
            if (b.hp <= 0) { b.alive = false; score += 90; updateHUD(); }
          }
        }
        for (const p of pigs) if (p.alive) {
          const dx = p.x-bird.x, dy = p.y-bird.y;
          const d = Math.hypot(dx,dy) || .001;
          if (d < p.r + bird.r) {
            const nx = dx/d, ny = dy/d, overlap = p.r+bird.r-d;
            bird.x -= nx*overlap*.45; bird.y -= ny*overlap*.45;
            p.x += nx*overlap*.55; p.y += ny*overlap*.55;
            const speed = Math.hypot(bird.vx-p.vx,bird.vy-p.vy);
            bird.vx *= .62; bird.vy *= .62;
            p.vx += nx*speed*.42; p.vy += ny*speed*.42;
            p.hp -= speed*10;
            score += Math.floor(speed*4);
            if (p.hp <= 0) killPig(p);
            updateHUD();
          }
        }
      }

      for (const b of blocks) if (b.alive) {
        for (const p of pigs) if (p.alive) {
          const before = Math.hypot(b.vx,b.vy);
          const hit = rectCircle(b, p);
          if (hit > 0 || before > 4) {
            const dmg = Math.max(hit*7, before*2.5);
            if (dmg > 5) {
              p.hp -= dmg;
              b.hp -= dmg*.18;
              if (p.hp <= 0) killPig(p);
              if (b.hp <= 0) { b.alive = false; score += 70; updateHUD(); }
            }
          }
        }
      }

      pigs = pigs.filter(p => p.alive);
      blocks = blocks.filter(b => b.alive);

      if (pigs.length === 0 && state !== "won") {
        state = "won";
        const bonus = birdsLeft * 250;
        score += bonus;
        updateHUD();
        showMsg("Level clear! Bonus +" + bonus + ". Press Next.");
        for (let i=0;i<80;i++) {
          confetti.push({
            x: 600 + (Math.random()-.5)*260,
            y: 140 + Math.random()*120,
            vx:(Math.random()-.5)*9,
            vy:(Math.random()-.8)*9,
            life:90+Math.random()*70,
            c:["#ff3b30","#ffcc00","#34c759","#007aff","#af52de","#fff"][Math.floor(Math.random()*6)]
          });
        }
        return;
      }

      let slow = true;
      if (bird && bird.launched) {
        const sp = Math.hypot(bird.vx,bird.vy);
        if (sp > 0.75 && bird.x < W+80 && bird.y < H+120) slow = false;
      }
      for (const b of blocks) if (Math.hypot(b.vx,b.vy) > 0.8) slow = false;
      for (const p of pigs) if (Math.hypot(p.vx,p.vy) > 0.8) slow = false;

      if (slow || (bird && (bird.x > W+120 || bird.y > H+160))) settleTimer++;
      else settleTimer = 0;

      if (settleTimer > 80 && state !== "won") {
        settleTimer = 0;
        if (birdsLeft > 0) spawnBird();
        else {
          state = "lost";
          showMsg("No birds left. Final score: " + score);
        }
      }
    }
  }

  function drawBackground() {
    const sky = ctx.createLinearGradient(0,0,0,groundY);
    sky.addColorStop(0,"#70d8ff");
    sky.addColorStop(.65,"#dff8ff");
    sky.addColorStop(1,"#a9ecff");
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "rgba(255,255,255,.9)";
    cloud(155,120,1.1);
    cloud(465,82,.8);
    cloud(790,135,1.0);
    cloud(1050,90,.9);

    ctx.fillStyle = "#66bd58";
    hill(180, groundY, 270, 135);
    ctx.fillStyle = "#7fca5e";
    hill(510, groundY, 360, 170);
    ctx.fillStyle = "#5fab4f";
    hill(930, groundY, 430, 160);

    ctx.fillStyle = "#74c653";
    ctx.fillRect(0, groundY, W, H-groundY);
    ctx.fillStyle = "#5aa940";
    for (let i=0;i<W;i+=34) {
      ctx.beginPath();
      ctx.moveTo(i, groundY);
      ctx.lineTo(i+12, groundY-16-Math.sin(i)*5);
      ctx.lineTo(i+24, groundY);
      ctx.fill();
    }
    ctx.fillStyle = "#7b4f2e";
    ctx.fillRect(0, groundY+35, W, H-groundY-35);
    ctx.fillStyle = "rgba(0,0,0,.09)";
    ctx.fillRect(0, groundY, W, 8);
  }

  function cloud(x,y,s) {
    ctx.beginPath();
    ctx.arc(x,y,28*s,0,Math.PI*2);
    ctx.arc(x+32*s,y-12*s,38*s,0,Math.PI*2);
    ctx.arc(x+70*s,y,30*s,0,Math.PI*2);
    ctx.arc(x+35*s,y+16*s,34*s,0,Math.PI*2);
    ctx.fill();
  }

  function hill(x, base, w, h) {
    ctx.beginPath();
    ctx.ellipse(x, base+20, w, h, 0, Math.PI, Math.PI*2);
    ctx.fill();
  }

  function drawSling() {
    ctx.lineCap = "round";
    ctx.lineWidth = 13;
    ctx.strokeStyle = "#5b301b";
    ctx.beginPath();
    ctx.moveTo(sling.x-27, groundY-5);
    ctx.lineTo(sling.x-16, sling.y-18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sling.x+25, groundY-5);
    ctx.lineTo(sling.x+18, sling.y-16);
    ctx.stroke();

    ctx.lineWidth = 6;
    ctx.strokeStyle = "#3e2418";
    ctx.beginPath();
    ctx.moveTo(sling.x-16, sling.y-18);
    if (state === "aiming" && bird) ctx.lineTo(bird.x, bird.y);
    else ctx.lineTo(sling.x, sling.y);
    ctx.lineTo(sling.x+18, sling.y-16);
    ctx.stroke();

    ctx.fillStyle = "#3f2415";
    ctx.beginPath();
    ctx.arc(sling.x-16, sling.y-18, 7, 0, Math.PI*2);
    ctx.arc(sling.x+18, sling.y-16, 7, 0, Math.PI*2);
    ctx.fill();
  }

  function drawBird(b) {
    if (!b) return;
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.beginPath();
    ctx.ellipse(5, b.r+8, b.r*.9, 5, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(6,-5,5,0,Math.PI*2);
    ctx.arc(-4,-6,5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(7,-5,2,0,Math.PI*2);
    ctx.arc(-3,-6,2,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#ffbd22";
    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(29,5);
    ctx.lineTo(15,10);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#531";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-9,-16);
    ctx.lineTo(-17,-25);
    ctx.moveTo(-1,-17);
    ctx.lineTo(-4,-28);
    ctx.stroke();
    ctx.restore();
  }

  function drawPig(p) {
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.fillStyle = "rgba(0,0,0,.17)";
    ctx.beginPath();
    ctx.ellipse(4, p.r+7, p.r*.9, 5, 0, 0, Math.PI*2);
    ctx.fill();

    const hpPct = Math.max(0, p.hp/p.maxHp);
    ctx.fillStyle = hpPct > .45 ? "#63d849" : "#acd93d";
    ctx.beginPath();
    ctx.arc(0,0,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.24)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#7dea5e";
    ctx.beginPath();
    ctx.arc(-13,-17,7,0,Math.PI*2);
    ctx.arc(13,-17,7,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#b8f28b";
    ctx.beginPath();
    ctx.ellipse(0,4,12,8,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#3b8d30";
    ctx.beginPath();
    ctx.arc(-4,4,2.3,0,Math.PI*2);
    ctx.arc(4,4,2.3,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-8,-5,4,0,Math.PI*2);
    ctx.arc(8,-5,4,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(-8,-5,1.7,0,Math.PI*2);
    ctx.arc(8,-5,1.7,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawBlock(b) {
    const pct = Math.max(0,b.hp/b.maxHp);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.fillStyle = pct > .55 ? "#b7834d" : pct > .25 ? "#9c6b3f" : "#765035";
    ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
    ctx.strokeStyle = "rgba(68,35,15,.75)";
    ctx.lineWidth = 3;
    ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 2;
    if (b.w > b.h) {
      for (let x=-b.w/2+18; x<b.w/2; x+=36) {
        ctx.beginPath(); ctx.moveTo(x,-b.h/2+4); ctx.lineTo(x,b.h/2-4); ctx.stroke();
      }
    } else {
      for (let y=-b.h/2+20; y<b.h/2; y+=38) {
        ctx.beginPath(); ctx.moveTo(-b.w/2+4,y); ctx.lineTo(b.w/2-4,y); ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawAim() {
    if (state !== "aiming" || !bird) return;
    const vx = (sling.x - bird.x) * 0.205 * bird.power;
    const vy = (sling.y - bird.y) * 0.205 * bird.power;
    let px = sling.x, py = sling.y, tx = vx, ty = vy;
    ctx.fillStyle = "rgba(0,0,0,.28)";
    for (let i=0;i<28;i++) {
      ty += gravity;
      px += tx;
      py += ty;
      if (py > groundY) break;
      if (i % 2 === 0) {
        ctx.beginPath();
        ctx.arc(px,py,3.2,0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawUIOverlay() {
    if (state === "won" || state === "lost") {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.32)";
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "900 58px Arial";
      ctx.fillText(state === "won" ? "LEVEL CLEAR!" : "GAME OVER", W/2, 245);
      ctx.font = "900 28px Arial";
      ctx.fillText("Score: " + score, W/2, 295);
      ctx.font = "bold 20px Arial";
      ctx.fillText(state === "won" ? "Press Next for another level" : "Press Restart to try again", W/2, 335);
      ctx.restore();
    }
  }

  function render() {
    drawBackground();

    ctx.globalAlpha = .45;
    for (let i=0;i<trail.length;i++) {
      const t = trail[i];
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(t.x,t.y,2+i*.06,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawAim();
    drawSling();

    blocks.forEach(drawBlock);
    pigs.forEach(drawPig);
    drawBird(bird);

    for (const c of confetti) {
      ctx.fillStyle = c.c;
      ctx.globalAlpha = Math.max(0, Math.min(1, c.life/40));
      ctx.fillRect(c.x,c.y,7,7);
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Drag the bird. Destroy all pigs. R = restart, N = next.", 18, H-18);

    drawUIOverlay();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetLevel(false);
  loop();
})();
</script>
</body>
