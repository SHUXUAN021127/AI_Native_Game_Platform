<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arcade Shooter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b2a4a 0%, #050712 70%);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gameWrap {
      position: relative;
      width: min(96vw, 520px);
      height: min(96vh, 760px);
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 35px rgba(0, 225, 255, 0.25), inset 0 0 30px rgba(255, 255, 255, 0.05);
      background: #050712;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(#070b1f, #02030a);
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px black;
      z-index: 5;
    }

    .hudBox {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(5px);
      min-width: 105px;
      text-align: center;
    }

    #lives span {
      color: #ff3d6e;
      text-shadow: 0 0 8px rgba(255, 61, 110, 0.8);
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(rgba(2, 3, 10, 0.75), rgba(2, 3, 10, 0.92));
      padding: 24px;
    }

    #panel {
      width: min(92%, 420px);
      padding: 28px 24px;
      border-radius: 22px;
      background: rgba(7, 12, 32, 0.92);
      border: 1px solid rgba(0, 225, 255, 0.25);
      box-shadow: 0 0 35px rgba(0, 225, 255, 0.2);
    }

    h1 {
      font-size: clamp(34px, 8vw, 54px);
      line-height: 0.95;
      margin-bottom: 14px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 225, 255, 0.8);
    }

    #message {
      color: #d8faff;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    #finalScore {
      font-size: 22px;
      font-weight: 800;
      color: #ffd166;
      margin-bottom: 18px;
      display: none;
    }

    button {
      border: none;
      cursor: pointer;
      color: #031018;
      background: linear-gradient(135deg, #00e5ff, #6effb8);
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: 0 8px 0 #07869a, 0 0 20px rgba(0, 229, 255, 0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #07869a, 0 0 12px rgba(0, 229, 255, 0.35);
    }

    #controls {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
    }

    #mobileControls {
      position: absolute;
      bottom: 14px;
      left: 0;
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 8;
      pointer-events: none;
    }

    .touchGroup {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .touchBtn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 24px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(0, 225, 255, 0.12);
    }

    .fireBtn {
      width: 72px;
      height: 72px;
      background: rgba(255, 61, 110, 0.38);
      box-shadow: 0 0 18px rgba(255, 61, 110, 0.35);
    }

    @media (hover: none), (pointer: coarse) {
      #mobileControls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="hudBox">SCORE<br><span id="score">0</span></div>
      <div class="hudBox">LEVEL<br><span id="level">1</span></div>
      <div class="hudBox" id="lives">LIVES<br><span id="lifeText">❤❤❤</span></div>
    </div>

    <div id="mobileControls">
      <div class="touchGroup">
        <div class="touchBtn" id="leftBtn">◀</div>
        <div class="touchBtn" id="rightBtn">▶</div>
      </div>
      <div class="touchGroup">
        <div class="touchBtn fireBtn" id="fireBtn">●</div>
      </div>
    </div>

    <div id="overlay">
      <div id="panel">
        <h1>Star Blaster</h1>
        <div id="message">
          Destroy incoming enemies, dodge collisions, and survive as long as possible.
        </div>
        <div id="finalScore"></div>
        <button id="startBtn">START GAME</button>
        <div id="controls">
          Desktop: ← → or A/D to move, Space to shoot<br>
          Mobile: use the on-screen buttons
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const lifeText = document.getElementById("lifeText");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const message = document.getElementById("message");
    const finalScore = document.getElementById("finalScore");

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const fireBtn = document.getElementById("fireBtn");

    let W, H, scale;
    let running = false;
    let gameOver = false;
    let score = 0;
    let level = 1;
    let lives = 3;
    let lastTime = 0;
    let enemyTimer = 0;
    let enemyDelay = 900;
    let shootCooldown = 0;
    let shake = 0;

    const keys = {
      left: false,
      right: false,
      fire: false
    };

    const player = {
      x: 0,
      y: 0,
      w: 42,
      h: 52,
      speed: 390,
      invincible: 0
    };

    let bullets = [];
    let enemies = [];
    let particles = [];
    let stars = [];
    let powerups = [];

    function resize() {
      const rect = canvas.getBoundingClientRect();
      scale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * scale);
      canvas.height = Math.floor(rect.height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      W = rect.width;
      H = rect.height;
      player.y = H - 85;
      if (!running) player.x = W / 2;
      createStars();
    }

    window.addEventListener("resize", resize);

    function createStars() {
      stars = [];
      for (let i = 0; i < 95; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.8 + 0.4,
          s: Math.random() * 90 + 30,
          a: Math.random() * 0.8 + 0.2
        });
      }
    }

    function resetGame() {
      score = 0;
      level = 1;
      lives = 3;
      enemyDelay = 900;
      enemyTimer = 0;
      shootCooldown = 0;
      shake = 0;
      gameOver = false;

      player.x = W / 2;
      player.y = H - 85;
      player.invincible = 0;

      bullets = [];
      enemies = [];
      particles = [];
      powerups = [];

      updateUI();
    }

    function startGame() {
      resize();
      resetGame();
      overlay.style.display = "none";
      running = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function endGame() {
      running = false;
      gameOver = true;
      overlay.style.display = "flex";
      message.textContent = "Game Over! The alien wave broke through your defenses.";
      finalScore.style.display = "block";
      finalScore.textContent = "Final Score: " + score;
      startBtn.textContent = "PLAY AGAIN";
    }

    startBtn.addEventListener("click", startGame);

    function updateUI() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
      lifeText.textContent = "❤".repeat(Math.max(0, lives));
    }

    function shoot() {
      if (shootCooldown > 0) return;
      bullets.push({
        x: player.x,
        y: player.y - player.h / 2,
        w: 5,
        h: 16,
        vy: -620,
        damage: 1
      });
      shootCooldown = 180;
      spawnParticles(player.x, player.y - 30, "#00e5ff", 5, 2);
    }

    function spawnEnemy() {
      const size = Math.random() * 18 + 30;
      const typeRoll = Math.random();
      let hp = 1;
      let color = "#ff4d6d";
      let points = 10;
      let speed = Math.random() * 65 + 95 + level * 12;

      if (level >= 3 && typeRoll > 0.76) {
        hp = 2;
        color = "#ffd166";
        points = 25;
        speed *= 0.82;
      }

      if (level >= 5 && typeRoll > 0.91) {
        hp = 3;
        color = "#b967ff";
        points = 45;
        speed *= 0.72;
      }

      enemies.push({
        x: Math.random() * (W - size) + size / 2,
        y: -size,
        r: size / 2,
        vy: speed,
        vx: (Math.random() - 0.5) * (35 + level * 6),
        hp,
        maxHp: hp,
        color,
        points,
        rot: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 2
      });
    }

    function spawnParticles(x, y, color, count, power) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 150 * power + 40;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: Math.random() * 350 + 250,
          maxLife: 600,
          r: Math.random() * 3 + 1.5,
          color
        });
      }
    }

    function maybeDropPowerup(x, y) {
      if (Math.random() < 0.08) {
        powerups.push({
          x,
          y,
          r: 13,
          vy: 120,
          type: "heart",
          pulse: 0
        });
      }
    }

    function rectCircleCollision(rx, ry, rw, rh, cx, cy, cr) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return dx * dx + dy * dy < cr * cr;
    }

    function circleCollision(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const r = a.r + b.r;
      return dx * dx + dy * dy < r * r;
    }

    function update(dt) {
      if (keys.left) player.x -= player.speed * dt;
      if (keys.right) player.x += player.speed * dt;
      player.x = Math.max(player.w / 2 + 8, Math.min(W - player.w / 2 - 8, player.x));

      if (keys.fire) shoot();

      shootCooldown -= dt * 1000;
      player.invincible -= dt * 1000;
      shake *= 0.88;

      for (const star of stars) {
        star.y += star.s * dt * (1 + level * 0.05);
        if (star.y > H) {
          star.y = -5;
          star.x = Math.random() * W;
        }
      }

      enemyTimer += dt * 1000;
      level = Math.floor(score / 300) + 1;
      enemyDelay = Math.max(260, 900 - level * 55);

      if (enemyTimer >= enemyDelay) {
        enemyTimer = 0;
        spawnEnemy();
        if (level >= 4 && Math.random() < 0.22) spawnEnemy();
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y += b.vy * dt;
        if (b.y + b.h < 0) bullets.splice(i, 1);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.vy * dt;
        e.x += e.vx * dt;
        e.rot += e.spin * dt;

        if (e.x < e.r || e.x > W - e.r) e.vx *= -1;

        if (e.y - e.r > H) {
          enemies.splice(i, 1);
          lives--;
          shake = 12;
          updateUI();
          if (lives <= 0) endGame();
          continue;
        }

        if (player.invincible <= 0 && rectCircleCollision(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, e.x, e.y, e.r)) {
          enemies.splice(i, 1);
          lives--;
          player.invincible = 1500;
          shake = 18;
          spawnParticles(player.x, player.y, "#ff3d6e", 28, 2.2);
          updateUI();
          if (lives <= 0) endGame();
          continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (rectCircleCollision(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, e.x, e.y, e.r)) {
            bullets.splice(j, 1);
            e.hp -= b.damage;
            spawnParticles(b.x, b.y, e.color, 7, 1.1);

            if (e.hp <= 0) {
              score += e.points;
              updateUI();
              spawnParticles(e.x, e.y, e.color, 26, 1.9);
              maybeDropPowerup(e.x, e.y);
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy * dt;
        p.pulse += dt * 7;

        if (p.y > H + 30) {
          powerups.splice(i, 1);
          continue;
        }

        if (circleCollision({ x: player.x, y: player.y, r: 24 }, p)) {
          powerups.splice(i, 1);
          lives = Math.min(5, lives + 1);
          score += 50;
          spawnParticles(player.x, player.y, "#6effb8", 22, 1.7);
          updateUI();
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.985;
        p.vy *= 0.985;
        p.life -= dt * 1000;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);

      if (player.invincible > 0 && Math.floor(player.invincible / 100) % 2 === 0) {
        ctx.globalAlpha = 0.45;
      }

      ctx.shadowBlur = 18;
      ctx.shadowColor = "#00e5ff";

      ctx.beginPath();
      ctx.moveTo(0, -player.h / 2);
      ctx.lineTo(player.w / 2, player.h / 2);
      ctx.lineTo(0, player.h / 3);
      ctx.lineTo(-player.w / 2, player.h / 2);
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, -player.h / 2, 0, player.h / 2);
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#00e5ff");
      grad.addColorStop(1, "#085dff");
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ff3d6e";
      ctx.beginPath();
      ctx.moveTo(-12, 20);
      ctx.lineTo(0, 34 + Math.random() * 6);
      ctx.lineTo(12, 20);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.rot);
      ctx.shadowBlur = 15;
      ctx.shadowColor = e.color;
      ctx.fillStyle = e.color;

      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        const rad = i % 2 === 0 ? e.r : e.r * 0.65;
        ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
      }
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath();
      ctx.arc(0, 0, e.r * 0.42, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(-e.r * 0.16, -e.r * 0.08, e.r * 0.08, 0, Math.PI * 2);
      ctx.arc(e.r * 0.16, -e.r * 0.08, e.r * 0.08, 0, Math.PI * 2);
      ctx.fill();

      if (e.maxHp > 1) {
        ctx.rotate(-e.rot);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.fillRect(-e.r, -e.r - 10, e.r * 2, 4);
        ctx.fillStyle = "#6effb8";
        ctx.fillRect(-e.r, -e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
      }

      ctx.restore();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, W, H);

      for (const star of stars) {
        ctx.globalAlpha = star.a;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;

      const glow = ctx.createRadialGradient(W / 2, H * 0.15, 10, W / 2, H * 0.15, W * 0.7);
      glow.addColorStop(0, "rgba(0,229,255,0.13)");
      glow.addColorStop(1, "rgba(0,229,255,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    }

    function draw() {
      ctx.save();

      if (shake > 0.5) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }

      drawBackground();

      for (const p of powerups) {
        ctx.save();
        ctx.translate(p.x, p.y);
        const pulse = Math.sin(p.pulse) * 3;
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#6effb8";
        ctx.fillStyle = "#6effb8";
        ctx.beginPath();
        ctx.arc(0, 0, p.r + pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#052013";
        ctx.font = "bold 18px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("❤", 0, 1);
        ctx.restore();
      }

      for (const b of bullets) {
        ctx.shadowBlur = 14;
        ctx.shadowColor = "#00e5ff";
        ctx.fillStyle = "#d8fbff";
        ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      }

      ctx.shadowBlur = 0;

      for (const e of enemies) drawEnemy(e);

      drawPlayer();

      for (const p of particles) {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function loop(now) {
      if (!running) return;

      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      update(dt);
      draw();

      if (running) requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
      if (e.code === "Space") {
        keys.fire = true;
        e.preventDefault();
      }
      if ((e.code === "Enter" || e.code === "Space") && !running) {
        startGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
      if (e.code === "Space") keys.fire = false;
    });

    function bindTouch(el, prop) {
      const on = (e) => {
        e.preventDefault();
        keys[prop] = true;
      };
      const off = (e) => {
        e.preventDefault();
        keys[prop] = false;
      };

      el.addEventListener("touchstart", on, { passive: false });
      el.addEventListener("touchend", off, { passive: false });
      el.addEventListener("touchcancel", off, { passive: false });
      el.addEventListener("mousedown", on);
      el.addEventListener("mouseup", off);
      el.addEventListener("mouseleave", off);
    }

    bindTouch(leftBtn, "left");
    bindTouch(rightBtn, "right");
    bindTouch(fireBtn, "fire");

    canvas.addEventListener("touchmove", (e) => {
      if (!running) return;
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      player.x = touch.clientX - rect.left;
      keys.fire = true;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      keys.fire = false;
    });

    resize();
    drawBackground();
    drawPlayer();
  </script>
</body>
</html>
