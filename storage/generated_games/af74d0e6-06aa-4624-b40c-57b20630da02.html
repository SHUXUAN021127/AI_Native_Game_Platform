<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f4037, #0f2027);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(95vw, 520px);
      padding: 20px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #7CFF6B;
      text-shadow: 0 0 12px rgba(124, 255, 107, 0.8);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .hud-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px;
    }

    .hud-box span {
      display: block;
      font-size: 0.75rem;
      opacity: 0.75;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-box strong {
      font-size: 1.35rem;
      color: #fff;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: 4px solid rgba(124, 255, 107, 0.55);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 0 0 25px rgba(124, 255, 107, 0.25);
      background: #111;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #101820;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
      z-index: 2;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #7CFF6B;
    }

    .overlay p {
      margin-bottom: 18px;
      opacity: 0.9;
      line-height: 1.4;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: bold;
      color: #102018;
      background: linear-gradient(135deg, #7CFF6B, #27e68b);
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(39, 230, 139, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(39, 230, 139, 0.45);
    }

    button:active {
      transform: scale(0.96);
    }

    .controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .controls button {
      width: 64px;
      height: 52px;
      padding: 0;
      border-radius: 14px;
      font-size: 1.35rem;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: none;
    }

    .controls button:hover {
      background: rgba(124, 255, 107, 0.2);
    }

    .up {
      grid-column: 2;
    }

    .left {
      grid-column: 1;
      grid-row: 2;
    }

    .down {
      grid-column: 2;
      grid-row: 2;
    }

    .right {
      grid-column: 3;
      grid-row: 2;
    }

    .footer-text {
      margin-top: 12px;
      font-size: 0.8rem;
      opacity: 0.65;
    }

    @media (max-width: 480px) {
      .game-wrapper {
        padding: 14px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .hud-box strong {
        font-size: 1.1rem;
      }

      .controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>SNAKE</h1>

    <div class="hud">
      <div class="hud-box">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-box">
        <span>Best</span>
        <strong id="bestScore">0</strong>
      </div>
      <div class="hud-box">
        <span>Speed</span>
        <strong id="speed">1</strong>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="480" height="480"></canvas>

      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Snake Game</h2>
        <p id="overlayText">Use arrow keys, WASD, or the buttons below to move. Eat food, grow longer, and avoid crashing.</p>
        <button id="startBtn">Start Game</button>
      </div>
    </div>

    <div class="controls">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <button class="down" data-dir="down">▼</button>
      <button class="right" data-dir="right">▶</button>
    </div>

    <div class="footer-text">Press Space to pause/resume</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestScoreEl = document.getElementById("bestScore");
    const speedEl = document.getElementById("speed");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");

    const gridSize = 24;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem("snakeBestScore")) || 0;
    let speedLevel;
    let gameInterval;
    let gameRunning = false;
    let paused = false;

    bestScoreEl.textContent = bestScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      speedLevel = 1;
      paused = false;

      updateHUD();
      spawnFood();
      drawGame();
    }

    function startGame() {
      initGame();
      gameRunning = true;
      overlay.classList.add("hidden");
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, getGameSpeed());
    }

    function getGameSpeed() {
      return Math.max(65, 145 - speedLevel * 10);
    }

    function updateGameSpeed() {
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, getGameSpeed());
    }

    function gameLoop() {
      if (!gameRunning || paused) return;

      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (isCollision(head)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;

        const newSpeedLevel = Math.floor(score / 50) + 1;
        if (newSpeedLevel !== speedLevel) {
          speedLevel = newSpeedLevel;
          updateGameSpeed();
        }

        spawnFood();
      } else {
        snake.pop();
      }

      updateHUD();
      drawGame();
    }

    function isCollision(position) {
      if (
        position.x < 0 ||
        position.x >= tileCount ||
        position.y < 0 ||
        position.y >= tileCount
      ) {
        return true;
      }

      return snake.some(segment => segment.x === position.x && segment.y === position.y);
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function drawGame() {
      drawBackground();
      drawFood();
      drawSnake();
    }

    function drawBackground() {
      ctx.fillStyle = "#101820";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < tileCount; y++) {
        for (let x = 0; x < tileCount; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "#12212a" : "#0e1a22";
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const px = segment.x * gridSize;
        const py = segment.y * gridSize;

        if (index === 0) {
          const gradient = ctx.createLinearGradient(px, py, px + gridSize, py + gridSize);
          gradient.addColorStop(0, "#b6ff8f");
          gradient.addColorStop(1, "#27e68b");
          ctx.fillStyle = gradient;
        } else {
          ctx.fillStyle = index % 2 === 0 ? "#4cff70" : "#39d95f";
        }

        roundRect(ctx, px + 2, py + 2, gridSize - 4, gridSize - 4, 7);
        ctx.fill();

        if (index === 0) {
          drawEyes(segment);
        }
      });
    }

    function drawEyes(head) {
      ctx.fillStyle = "#102018";

      const baseX = head.x * gridSize;
      const baseY = head.y * gridSize;

      let eye1 = { x: baseX + 7, y: baseY + 7 };
      let eye2 = { x: baseX + 17, y: baseY + 7 };

      if (direction.x === 1) {
        eye1 = { x: baseX + 16, y: baseY + 7 };
        eye2 = { x: baseX + 16, y: baseY + 17 };
      } else if (direction.x === -1) {
        eye1 = { x: baseX + 8, y: baseY + 7 };
        eye2 = { x: baseX + 8, y: baseY + 17 };
      } else if (direction.y === 1) {
        eye1 = { x: baseX + 7, y: baseY + 16 };
        eye2 = { x: baseX + 17, y: baseY + 16 };
      }

      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.4, 0, Math.PI * 2);
      ctx.arc(eye2.x, eye2.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const cx = food.x * gridSize + gridSize / 2;
      const cy = food.y * gridSize + gridSize / 2;

      ctx.fillStyle = "#ff4757";
      ctx.beginPath();
      ctx.arc(cx, cy, gridSize * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 5, gridSize * 0.12, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#4cff70";
      ctx.beginPath();
      ctx.ellipse(cx + 5, cy - 10, 4, 8, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    function updateHUD() {
      scoreEl.textContent = score;
      bestScoreEl.textContent = bestScore;
      speedEl.textContent = speedLevel;
    }

    function endGame() {
      gameRunning = false;
      clearInterval(gameInterval);

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snakeBestScore", bestScore);
      }

      updateHUD();

      overlayTitle.textContent = "Game Over";
      overlayText.textContent = "Your score: " + score + ". Best score: " + bestScore + ". Try again!";
      startBtn.textContent = "Play Again";
      overlay.classList.remove("hidden");
    }

    function togglePause() {
      if (!gameRunning) return;

      paused = !paused;

      if (paused) {
        overlayTitle.textContent = "Paused";
        overlayText.textContent = "Press Space or Resume to continue.";
        startBtn.textContent = "Resume";
        overlay.classList.remove("hidden");
      } else {
        overlay.classList.add("hidden");
      }
    }

    function setDirection(dir) {
      if (dir === "up" && direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      } else if (dir === "down" && direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      } else if (dir === "left" && direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      } else if (dir === "right" && direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) {
        e.preventDefault();
      }

      if (key === "arrowup" || key === "w") setDirection("up");
      if (key === "arrowdown" || key === "s") setDirection("down");
      if (key === "arrowleft" || key === "a") setDirection("left");
      if (key === "arrowright" || key === "d") setDirection("right");

      if (key === " ") {
        if (!gameRunning) {
          startGame();
        } else {
          togglePause();
        }
      }
    });

    document.querySelectorAll(".controls button").forEach(button => {
      button.addEventListener("click", () => {
        setDirection(button.dataset.dir);
      });

      button.addEventListener("touchstart", (e) => {
        e.preventDefault();
        setDirection(button.dataset.dir);
      }, { passive: false });
    });

    startBtn.addEventListener("click", () => {
      if (gameRunning && paused) {
        paused = false;
        overlay.classList.add("hidden");
      } else {
        startGame();
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? "right" : "left");
      } else {
        setDirection(dy > 0 ? "down" : "up");
      }
    }, { passive: true });

    initGame();
  </script>
</body>
</html>
