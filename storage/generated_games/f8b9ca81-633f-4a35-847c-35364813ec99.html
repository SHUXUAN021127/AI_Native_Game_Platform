<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(42, 255, 142, 0.16), transparent 35%),
        linear-gradient(135deg, #07130d, #020403);
      color: #eafff1;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(94vw, 560px);
      padding: 22px;
      border-radius: 24px;
      background: rgba(5, 18, 10, 0.88);
      border: 1px solid rgba(126, 255, 178, 0.28);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55), inset 0 0 30px rgba(48, 255, 131, 0.06);
      backdrop-filter: blur(10px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.5rem);
      letter-spacing: 1px;
      color: #7dffad;
      text-shadow: 0 0 18px rgba(125, 255, 173, 0.45);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat-box {
      min-width: 86px;
      padding: 9px 12px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(125, 255, 173, 0.22);
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #a7cdb4;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(125, 255, 173, 0.36);
      background: #06100a;
      box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.65), 0 0 30px rgba(46, 255, 126, 0.12);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 22px;
      text-align: center;
      background: rgba(0, 0, 0, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-size: clamp(2rem, 7vw, 3.4rem);
      color: #7dffad;
      text-shadow: 0 0 20px rgba(125, 255, 173, 0.55);
    }

    .overlay p {
      max-width: 360px;
      color: #d7ffe4;
      line-height: 1.4;
      font-size: 1rem;
    }

    button {
      border: 0;
      cursor: pointer;
      color: #021007;
      background: linear-gradient(180deg, #8effb8, #35d975);
      font-weight: 800;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1rem;
      box-shadow: 0 8px 22px rgba(53, 217, 117, 0.28);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: scale(0.96);
    }

    .controls-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #eafff1;
      border: 1px solid rgba(125, 255, 173, 0.25);
      box-shadow: none;
    }

    .hint {
      margin-top: 13px;
      text-align: center;
      color: #a9cbb5;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .mobile-controls {
      display: none;
      margin: 16px auto 0;
      width: 178px;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 50px);
      gap: 6px;
      justify-content: center;
    }

    .dpad-btn {
      padding: 0;
      border-radius: 13px;
      font-size: 1.35rem;
      color: #eafff1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(125, 255, 173, 0.25);
      box-shadow: none;
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }

    @media (hover: none), (max-width: 700px) {
      body {
        align-items: flex-start;
        padding-top: 12px;
        overflow-y: auto;
      }

      .game-wrapper {
        padding: 15px;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      .stats {
        justify-content: center;
      }

      .mobile-controls {
        display: grid;
      }

      .hint {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrapper">
    <header>
      <h1>Snake</h1>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Best</div>
          <div class="stat-value" id="best">0</div>
        </div>
      </div>
    </header>

    <section class="canvas-wrap">
      <canvas id="game" width="500" height="500" aria-label="Snake game board"></canvas>

      <div class="overlay show" id="overlay">
        <h2 id="overlayTitle">Snake</h2>
        <p id="overlayText">Eat the apples, grow longer, and avoid walls and yourself.</p>
        <button id="startBtn">Start Game</button>
      </div>
    </section>

    <div class="controls-row">
      <button id="pauseBtn" class="secondary">Pause</button>
      <button id="restartBtn" class="secondary">Restart</button>
    </div>

    <div class="mobile-controls" aria-label="Mobile controls">
      <button class="dpad-btn up" data-dir="up">▲</button>
      <button class="dpad-btn left" data-dir="left">◀</button>
      <button class="dpad-btn right" data-dir="right">▶</button>
      <button class="dpad-btn down" data-dir="down">▼</button>
    </div>

    <p class="hint">Use Arrow Keys or WASD. Press Space to pause/resume.</p>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");

    const gridSize = 25;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("snakeBestScore") || 0);
    let running = false;
    let paused = false;
    let gameOver = false;
    let lastTime = 0;
    let moveDelay = 115;
    let accumulator = 0;

    bestEl.textContent = best;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      moveDelay = 115;
      running = true;
      paused = false;
      gameOver = false;
      accumulator = 0;
      scoreEl.textContent = score;
      pauseBtn.textContent = "Pause";
      placeFood();
      hideOverlay();
      draw();
    }

    function startLoop(time) {
      lastTime = time;
      requestAnimationFrame(gameLoop);
    }

    function gameLoop(time) {
      const delta = time - lastTime;
      lastTime = time;

      if (running && !paused && !gameOver) {
        accumulator += delta;
        while (accumulator >= moveDelay) {
          update();
          accumulator -= moveDelay;
        }
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem("snakeBestScore", best);
        }

        if (moveDelay > 65) {
          moveDelay -= 2;
        }

        placeFood();
      } else {
        snake.pop();
      }
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function draw() {
      drawBackground();
      drawFood();
      drawSnake();
    }

    function drawBackground() {
      ctx.fillStyle = "#06100a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < tileCount; y++) {
        for (let x = 0; x < tileCount; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "#07170d" : "#081d10";
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }

      ctx.strokeStyle = "rgba(125, 255, 173, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const px = segment.x * gridSize;
        const py = segment.y * gridSize;
        const padding = index === 0 ? 2 : 3;

        const gradient = ctx.createLinearGradient(px, py, px + gridSize, py + gridSize);
        if (index === 0) {
          gradient.addColorStop(0, "#b9ffd0");
          gradient.addColorStop(1, "#35d975");
        } else {
          gradient.addColorStop(0, "#65f59c");
          gradient.addColorStop(1, "#1ea853");
        }

        ctx.fillStyle = gradient;
        roundRect(px + padding, py + padding, gridSize - padding * 2, gridSize - padding * 2, 7);
        ctx.fill();

        if (index === 0) {
          drawEyes(segment);
        }
      });
    }

    function drawEyes(head) {
      const centerX = head.x * gridSize + gridSize / 2;
      const centerY = head.y * gridSize + gridSize / 2;

      let eye1 = { x: -5, y: -5 };
      let eye2 = { x: -5, y: 5 };

      if (direction.x === 1) {
        eye1 = { x: 5, y: -5 };
        eye2 = { x: 5, y: 5 };
      } else if (direction.x === -1) {
        eye1 = { x: -5, y: -5 };
        eye2 = { x: -5, y: 5 };
      } else if (direction.y === 1) {
        eye1 = { x: -5, y: 5 };
        eye2 = { x: 5, y: 5 };
      } else if (direction.y === -1) {
        eye1 = { x: -5, y: -5 };
        eye2 = { x: 5, y: -5 };
      }

      ctx.fillStyle = "#021007";
      ctx.beginPath();
      ctx.arc(centerX + eye1.x, centerY + eye1.y, 2.6, 0, Math.PI * 2);
      ctx.arc(centerX + eye2.x, centerY + eye2.y, 2.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const cx = food.x * gridSize + gridSize / 2;
      const cy = food.y * gridSize + gridSize / 2;

      ctx.shadowColor = "rgba(255, 74, 74, 0.8)";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "#ff4242";
      ctx.beginPath();
      ctx.arc(cx, cy, gridSize * 0.36, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#9affb9";
      ctx.beginPath();
      ctx.ellipse(cx + 4, cy - 10, 5, 2.7, -0.55, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function setDirection(newDir) {
      if (!running || gameOver) return;

      if (
        newDir.x + direction.x === 0 &&
        newDir.y + direction.y === 0
      ) {
        return;
      }

      nextDirection = newDir;
    }

    function togglePause() {
      if (!running || gameOver) return;

      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";

      if (paused) {
        showOverlay("Paused", "Press Space or Resume to continue.", "Resume");
      } else {
        hideOverlay();
      }
    }

    function endGame() {
      gameOver = true;
      running = false;
      showOverlay("Game Over", "Final score: " + score + ". Try again and beat your best!", "Play Again");
    }

    function showOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startBtn.textContent = buttonText;
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
    }

    startBtn.addEventListener("click", () => {
      if (paused && running && !gameOver) {
        togglePause();
      } else {
        initGame();
      }
    });

    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", initGame);

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
        e.preventDefault();
      }

      if (key === "arrowup" || key === "w") setDirection({ x: 0, y: -1 });
      if (key === "arrowdown" || key === "s") setDirection({ x: 0, y: 1 });
      if (key === "arrowleft" || key === "a") setDirection({ x: -1, y: 0 });
      if (key === "arrowright" || key === "d") setDirection({ x: 1, y: 0 });

      if (key === " ") {
        if (!running || gameOver) {
          initGame();
        } else {
          togglePause();
        }
      }
    });

    document.querySelectorAll(".dpad-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const dir = btn.dataset.dir;
        if (dir === "up") setDirection({ x: 0, y: -1 });
        if (dir === "down") setDirection({ x: 0, y: 1 });
        if (dir === "left") setDirection({ x: -1, y: 0 });
        if (dir === "right") setDirection({ x: 1, y: 0 });
      });
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();

      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;

      if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
      } else {
        setDirection(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      }

      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    food = { x: 14, y: 10 };
    draw();

    requestAnimationFrame(startLoop);
  </script>
</body>
</html>
