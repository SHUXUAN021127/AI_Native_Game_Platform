<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1f2937, #020617);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(95vw, 520px);
      padding: 20px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 14px;
      letter-spacing: 2px;
      color: #22c55e;
      text-shadow: 0 0 18px rgba(34, 197, 94, 0.7);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-label {
      display: block;
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: #facc15;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
      border: 4px solid #334155;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(2, 6, 23, 0.76);
      backdrop-filter: blur(4px);
      padding: 20px;
      transition: opacity 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay h2 {
      font-size: 34px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .overlay p {
      font-size: 15px;
      line-height: 1.5;
      max-width: 320px;
      color: #cbd5e1;
      margin-bottom: 18px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 22px;
      font-weight: bold;
      font-size: 15px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    button:active {
      transform: scale(0.96);
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .secondary {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: #082f49;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    .danger {
      background: linear-gradient(135deg, #fb7185, #e11d48);
      color: #fff1f2;
      box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);
    }

    .mobile-controls {
      display: none;
      margin-top: 18px;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 48px);
      justify-content: center;
      gap: 8px;
    }

    .mobile-controls button {
      padding: 0;
      border-radius: 14px;
      font-size: 24px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mobile-controls .up {
      grid-column: 2;
      grid-row: 1;
    }

    .mobile-controls .left {
      grid-column: 1;
      grid-row: 2;
    }

    .mobile-controls .right {
      grid-column: 3;
      grid-row: 2;
    }

    .mobile-controls .down {
      grid-column: 2;
      grid-row: 3;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 640px) {
      body {
        align-items: flex-start;
        padding-top: 12px;
      }

      .game-wrapper {
        padding: 14px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .stat-value {
        font-size: 18px;
      }

      .mobile-controls {
        display: grid;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>SNAKE</h1>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="best">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="level">1</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="480" height="480"></canvas>

      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Snake Game</h2>
        <p id="overlayText">Eat the red food, grow longer, and avoid crashing into walls or yourself.</p>
        <button id="startButton">Start Game</button>
      </div>
    </div>

    <div class="controls-row">
      <button id="pauseButton" class="secondary">Pause</button>
      <button id="restartButton" class="danger">Restart</button>
    </div>

    <div class="mobile-controls" aria-label="Mobile controls">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <button class="right" data-dir="right">▶</button>
      <button class="down" data-dir="down">▼</button>
    </div>

    <div class="hint">Use Arrow Keys or WASD to move. Press Space to pause.</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const levelEl = document.getElementById("level");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const restartButton = document.getElementById("restartButton");

    const gridSize = 24;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem("snakeBestScore")) || 0;
    let level;
    let speed;
    let gameLoop;
    let running = false;
    let paused = false;
    let gameOver = false;

    bestEl.textContent = bestScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };

      score = 0;
      level = 1;
      speed = 135;
      running = false;
      paused = false;
      gameOver = false;

      scoreEl.textContent = score;
      levelEl.textContent = level;
      pauseButton.textContent = "Pause";

      placeFood();
      draw();
    }

    function startGame() {
      if (running && !gameOver) return;

      if (gameOver) {
        initGame();
      }

      running = true;
      paused = false;
      gameOver = false;
      overlay.classList.add("hidden");
      pauseButton.textContent = "Pause";

      clearInterval(gameLoop);
      gameLoop = setInterval(update, speed);
    }

    function restartGame() {
      clearInterval(gameLoop);
      initGame();
      startGame();
    }

    function togglePause() {
      if (!running || gameOver) return;

      paused = !paused;

      if (paused) {
        clearInterval(gameLoop);
        pauseButton.textContent = "Resume";
        showOverlay("Paused", "Press Resume, Space, or Start Game to continue.", "Resume");
      } else {
        overlay.classList.add("hidden");
        pauseButton.textContent = "Pause";
        clearInterval(gameLoop);
        gameLoop = setInterval(update, speed);
      }
    }

    function showOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startButton.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount ||
        isSnakeCell(head.x, head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;

        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("snakeBestScore", bestScore);
          bestEl.textContent = bestScore;
        }

        const newLevel = Math.floor(score / 50) + 1;
        if (newLevel !== level) {
          level = newLevel;
          levelEl.textContent = level;
          speed = Math.max(55, 135 - (level - 1) * 10);
          clearInterval(gameLoop);
          gameLoop = setInterval(update, speed);
        }

        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      clearInterval(gameLoop);
      running = false;
      gameOver = true;
      draw();
      showOverlay("Game Over", "Final Score: " + score + ". Try again and beat your best score!", "Play Again");
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (isSnakeCell(food.x, food.y));
    }

    function isSnakeCell(x, y) {
      return snake.some(segment => segment.x === x && segment.y === y);
    }

    function draw() {
      drawBoard();
      drawFood();
      drawSnake();
    }

    function drawBoard() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < tileCount; y++) {
        for (let x = 0; x < tileCount; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "#0f172a" : "#111c31";
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }

      ctx.strokeStyle = "rgba(148, 163, 184, 0.08)";
      ctx.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const x = segment.x * gridSize;
        const y = segment.y * gridSize;
        const padding = index === 0 ? 2 : 3;

        if (index === 0) {
          const gradient = ctx.createLinearGradient(x, y, x + gridSize, y + gridSize);
          gradient.addColorStop(0, "#86efac");
          gradient.addColorStop(1, "#16a34a");
          ctx.fillStyle = gradient;
        } else {
          const alpha = Math.max(0.45, 1 - index * 0.025);
          ctx.fillStyle = "rgba(34, 197, 94, " + alpha + ")";
        }

        roundRect(
          x + padding,
          y + padding,
          gridSize - padding * 2,
          gridSize - padding * 2,
          6
        );

        if (index === 0) {
          drawEyes(segment);
        }
      });
    }

    function drawEyes(head) {
      const baseX = head.x * gridSize;
      const baseY = head.y * gridSize;

      ctx.fillStyle = "#052e16";

      let eye1 = { x: baseX + 7, y: baseY + 7 };
      let eye2 = { x: baseX + 17, y: baseY + 7 };

      if (direction.x === 1) {
        eye1 = { x: baseX + 16, y: baseY + 7 };
        eye2 = { x: baseX + 16, y: baseY + 16 };
      } else if (direction.x === -1) {
        eye1 = { x: baseX + 8, y: baseY + 7 };
        eye2 = { x: baseX + 8, y: baseY + 16 };
      } else if (direction.y === 1) {
        eye1 = { x: baseX + 7, y: baseY + 16 };
        eye2 = { x: baseX + 17, y: baseY + 16 };
      }

      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(eye2.x, eye2.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const centerX = food.x * gridSize + gridSize / 2;
      const centerY = food.y * gridSize + gridSize / 2;

      const pulse = Math.sin(Date.now() / 130) * 1.5;

      ctx.fillStyle = "rgba(239, 68, 68, 0.25)";
      ctx.beginPath();
      ctx.arc(centerX, centerY, 11 + pulse, 0, Math.PI * 2);
      ctx.fill();

      const gradient = ctx.createRadialGradient(centerX - 3, centerY - 3, 2, centerX, centerY, 10);
      gradient.addColorStop(0, "#fecaca");
      gradient.addColorStop(0.45, "#ef4444");
      gradient.addColorStop(1, "#991b1b");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 8.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#22c55e";
      ctx.beginPath();
      ctx.ellipse(centerX + 5, centerY - 9, 4, 2.5, -0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    function changeDirection(newDir) {
      if (newDir === "up" && direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      } else if (newDir === "down" && direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      } else if (newDir === "left" && direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      } else if (newDir === "right" && direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") changeDirection("up");
      if (key === "arrowdown" || key === "s") changeDirection("down");
      if (key === "arrowleft" || key === "a") changeDirection("left");
      if (key === "arrowright" || key === "d") changeDirection("right");

      if (key === " ") {
        if (!running && !gameOver) {
          startGame();
        } else {
          togglePause();
        }
      }

      if (!running && !paused && !gameOver && ["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(key)) {
        startGame();
      }
    });

    document.querySelectorAll(".mobile-controls button").forEach(button => {
      button.addEventListener("click", () => {
        changeDirection(button.dataset.dir);
        if (!running && !gameOver) startGame();
      });
    });

    startButton.addEventListener("click", () => {
      if (paused) {
        togglePause();
      } else {
        startGame();
      }
    });

    pauseButton.addEventListener("click", togglePause);
    restartButton.addEventListener("click", restartGame);

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        changeDirection(dx > 0 ? "right" : "left");
      } else {
        changeDirection(dy > 0 ? "down" : "up");
      }

      if (!running && !gameOver) startGame();
    }, { passive: true });

    function animateFood() {
      if (!running || paused || gameOver) {
        draw();
      }
      requestAnimationFrame(animateFood);
    }

    initGame();
    animateFood();
  </script>
</body>
</html>
