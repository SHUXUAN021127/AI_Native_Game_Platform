<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arcade Shooter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(31, 60, 120, 0.9), rgba(3, 6, 18, 1) 70%),
        #030612;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-shell {
      position: relative;
      width: min(96vw, 520px);
      height: min(96vh, 760px);
      border: 2px solid rgba(102, 225, 255, 0.6);
      border-radius: 18px;
      overflow: hidden;
      background: #030716;
      box-shadow:
        0 0 25px rgba(0, 213, 255, 0.35),
        inset 0 0 35px rgba(30, 100, 180, 0.25);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      touch-action: none;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 5;
      font-weight: 800;
      text-shadow: 0 0 8px #00eaff;
      letter-spacing: 0.5px;
    }

    .hud-item {
      background: rgba(2, 12, 30, 0.58);
      border: 1px solid rgba(0, 234, 255, 0.4);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: inset 0 0 12px rgba(0, 234, 255, 0.12);
      font-size: 14px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, rgba(3, 16, 40, 0.86), rgba(0, 0, 0, 0.9));
      text-align: center;
    }

    .panel {
      width: 100%;
      max-width: 390px;
      border: 1px solid rgba(0, 234, 255, 0.55);
      border-radius: 22px;
      padding: 28px 22px;
      background: rgba(3, 9, 24, 0.82);
      box-shadow:
        0 0 30px rgba(0, 234, 255, 0.24),
        inset 0 0 26px rgba(0, 120, 255, 0.16);
    }

    .title {
      font-size: clamp(34px, 8vw, 54px);
      line-height: 0.95;
      margin-bottom: 14px;
      color: #fff;
      text-transform: uppercase;
      text-shadow:
        0 0 8px #00eaff,
        0 0 20px #0077ff,
        0 0 36px #7d2cff;
    }

    .subtitle {
      color: #bff8ff;
      margin-bottom: 18px;
      line-height: 1.45;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 8px;
      background: rgba(255,255,255,0.06);
    }

    .stat span {
      display: block;
      color: #90ecff;
      font-size: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat strong {
      font-size: 24px;
      color: #fff;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 26px;
      background: linear-gradient(135deg, #00eaff, #0077ff 55%, #7d2cff);
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 20px rgba(0, 234, 255, 0.35),
        0 10px 25px rgba(0,0,0,0.35);
      transition: transform 0.12s ease, filter 0.12s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    button:active {
      transform: scale(0.96);
    }

    .controls {
      margin-top: 16px;
      color: #d4fbff;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .hidden {
      display: none;
    }

    .mobile-controls {
      position: absolute;
      bottom: 15px;
      left: 0;
      width: 100%;
      z-index: 6;
      display: none;
      justify-content: space-between;
      padding: 0 18px;
      pointer-events: none;
    }

    .pad {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: rgba(0, 234, 255, 0.12);
      border: 1px solid rgba(0, 234, 255, 0.36);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.85);
      font-weight: 900;
      font-size: 13px;
      box-shadow: inset 0 0 18px rgba(0, 234, 255, 0.18);
    }

    .shoot-pad {
      background: rgba(255, 52, 124, 0.18);
      border-color: rgba(255, 52, 124, 0.55);
      box-shadow: inset 0 0 18px rgba(255, 52, 124, 0.2);
    }

    @media (pointer: coarse) {
      .mobile-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell" id="gameShell">
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
      <div class="hud-item">Score: <span id="score">0</span></div>
      <div class="hud-item">Lives: <span id="lives">3</span></div>
      <div class="hud-item">Wave: <span id="wave">1</span></div>
    </div>

    <div class="mobile-controls">
      <div class="pad">MOVE</div>
      <div class="pad shoot-pad">SHOOT</div>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h1 class="title" id="overlayTitle">Star Blaster</h1>
        <p class="subtitle" id="overlayText">
          Destroy enemy ships, dodge incoming fire, and survive as long as possible.
        </p>

        <div class="stats">
          <div class="stat">
            <span>Score</span>
            <strong id="finalScore">0</strong>
          </div>
          <div class="stat">
            <span>Best</span>
            <strong id="bestScore">0</strong>
          </div>
        </div>

        <button id="startButton">Start Game</button>

        <div class="controls">
          Desktop: Arrow Keys / WASD to move, Space to shoot.<br />
          Mobile: Drag to move, tap to shoot.
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const shell = document.getElementById("gameShell");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const waveEl = document.getElementById("wave");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const finalScoreEl = document.getElementById("finalScore");
    const bestScoreEl = document.getElementById("bestScore");

    let W = 0;
    let H = 0;
    let dpr = 1;

    let gameRunning = false;
    let animationId = null;
    let lastTime = 0;

    let score = 0;
    let lives = 3;
    let wave = 1;
    let bestScore = Number(localStorage.getItem("starBlasterBest") || 0);

    let player;
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let stars = [];
    let powerups = [];

    const keys = {};
    let pointerDown = false;
    let pointerX = 0;
    let pointerY = 0;
    let touchShootCooldown = 0;

    function resize() {
      const rect = shell.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = rect.width;
      H = rect.height;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (player) {
        player.x = Math.max(player.r, Math.min(W - player.r, player.x));
        player.y = Math.max(player.r, Math.min(H - player.r, player.y));
      }

      createStars();
    }

    function createStars() {
      stars = [];
      const count = Math.floor((W * H) / 4200);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.6 + 0.4,
          speed: Math.random() * 70 + 25,
          alpha: Math.random() * 0.65 + 0.25
        });
      }
    }

    function resetGame() {
      score = 0;
      lives = 3;
      wave = 1;

      bullets = [];
      enemies = [];
      enemyBullets = [];
      particles = [];
      powerups = [];

      player = {
        x: W / 2,
        y: H - 88,
        r: 18,
        speed: 360,
        fireCooldown: 0,
        fireRate: 0.18,
        invincible: 1.8,
        powerTimer: 0
      };

      for (let i = 0; i < 5; i++) spawnEnemy();
      updateUI();
    }

    function startGame() {
      overlay.classList.add("hidden");
      resetGame();
      gameRunning = true;
      lastTime = performance.now();
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(loop);
    }

    function gameOver() {
      gameRunning = false;
      cancelAnimationFrame(animationId);

      bestScore = Math.max(bestScore, score);
      localStorage.setItem("starBlasterBest", bestScore);

      overlayTitle.textContent = "Game Over";
      overlayText.textContent = "Your ship was destroyed. Upgrade your reflexes and try again!";
      startButton.textContent = "Restart";
      finalScoreEl.textContent = score;
      bestScoreEl.textContent = bestScore;
      overlay.classList.remove("hidden");
    }

    function updateUI() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      waveEl.textContent = wave;
      finalScoreEl.textContent = score;
      bestScoreEl.textContent = bestScore;
    }

    function spawnEnemy() {
      const size = Math.random() * 14 + 18;
      const typeRoll = Math.random();
      const type = typeRoll > 0.88 ? "heavy" : typeRoll > 0.68 ? "shooter" : "basic";

      enemies.push({
        x: Math.random() * (W - size * 2) + size,
        y: -Math.random() * H * 0.5 - size,
        r: type === "heavy" ? size + 7 : size,
        speed: (type === "heavy" ? 55 : type === "shooter" ? 80 : 110) + wave * 8 + Math.random() * 40,
        hp: type === "heavy" ? 3 : type === "shooter" ? 2 : 1,
        maxHp: type === "heavy" ? 3 : type === "shooter" ? 2 : 1,
        type,
        drift: (Math.random() - 0.5) * 90,
        phase: Math.random() * Math.PI * 2,
        shootTimer: Math.random() * 1.5 + 0.8
      });
    }

    function shoot() {
      if (!player || player.fireCooldown > 0) return;

      player.fireCooldown = player.fireRate;

      const powered = player.powerTimer > 0;
      bullets.push({
        x: player.x,
        y: player.y - player.r,
        vx: 0,
        vy: -620,
        r: 4,
        damage: 1
      });

      if (powered) {
        bullets.push({
          x: player.x - 13,
          y: player.y - 8,
          vx: -85,
          vy: -590,
          r: 3.5,
          damage: 1
        });
        bullets.push({
          x: player.x + 13,
          y: player.y - 8,
          vx: 85,
          vy: -590,
          r: 3.5,
          damage: 1
        });
      }
    }

    function enemyShoot(enemy) {
      const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
      const speed = 190 + wave * 8;
      enemyBullets.push({
        x: enemy.x,
        y: enemy.y + enemy.r * 0.5,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 5
      });
    }

    function spawnExplosion(x, y, color, count = 18) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 260 + 50;
        particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: Math.random() * 3.5 + 1.5,
          life: Math.random() * 0.45 + 0.35,
          maxLife: 0.8,
          color
        });
      }
    }

    function spawnPowerup(x, y) {
      if (Math.random() < 0.14) {
        powerups.push({
          x,
          y,
          r: 12,
          vy: 120,
          type: Math.random() < 0.55 ? "power" : "life",
          spin: 0
        });
      }
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function hitCircle(a, b) {
      return distance(a, b) < a.r + b.r;
    }

    function damagePlayer() {
      if (player.invincible > 0) return;

      lives--;
      player.invincible = 1.6;
      spawnExplosion(player.x, player.y, "#00eaff", 28);

      if (lives <= 0) {
        updateUI();
        gameOver();
      }
    }

    function update(dt) {
      touchShootCooldown -= dt;

      for (const star of stars) {
        star.y += star.speed * dt * (1 + wave * 0.035);
        if (star.y > H) {
          star.y = -5;
          star.x = Math.random() * W;
        }
      }

      if (!player) return;

      let mx = 0;
      let my = 0;

      if (keys.ArrowLeft || keys.KeyA) mx -= 1;
      if (keys.ArrowRight || keys.KeyD) mx += 1;
      if (keys.ArrowUp || keys.KeyW) my -= 1;
      if (keys.ArrowDown || keys.KeyS) my += 1;

      if (mx !== 0 || my !== 0) {
        const len = Math.hypot(mx, my);
        mx /= len;
        my /= len;
        player.x += mx * player.speed * dt;
        player.y += my * player.speed * dt;
      }

      if (pointerDown) {
        const dx = pointerX - player.x;
        const dy = pointerY - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 4) {
          const move = Math.min(dist, player.speed * 1.25 * dt);
          player.x += (dx / dist) * move;
          player.y += (dy / dist) * move;
        }

        if (touchShootCooldown <= 0) {
          shoot();
          touchShootCooldown = 0.13;
        }
      }

      if (keys.Space) shoot();

      player.x = Math.max(player.r, Math.min(W - player.r, player.x));
      player.y = Math.max(H * 0.18, Math.min(H - player.r, player.y));

      player.fireCooldown = Math.max(0, player.fireCooldown - dt);
      player.invincible = Math.max(0, player.invincible - dt);
      player.powerTimer = Math.max(0, player.powerTimer - dt);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        if (b.y < -20 || b.x < -20 || b.x > W + 20) {
          bullets.splice(i, 1);
        }
      }

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        if (b.y > H + 30 || b.y < -30 || b.x < -30 || b.x > W + 30) {
          enemyBullets.splice(i, 1);
          continue;
        }

        if (hitCircle(player, b)) {
          enemyBullets.splice(i, 1);
          damagePlayer();
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.phase += dt * 2;
        e.y += e.speed * dt;
        e.x += Math.sin(e.phase) * e.drift * dt;

        if (e.x < e.r || e.x > W - e.r) e.drift *= -1;

        if (e.type === "shooter" || e.type === "heavy") {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0 && e.y > 20 && e.y < H * 0.75) {
            enemyShoot(e);
            e.shootTimer = e.type === "heavy" ? 1.2 : 1.55;
          }
        }

        if (hitCircle(player, e)) {
          enemies.splice(i, 1);
          spawnExplosion(e.x, e.y, "#ff347c", 24);
          damagePlayer();
          spawnEnemy();
          continue;
        }

        if (e.y > H + e.r) {
          enemies.splice(i, 1);
          lives--;
          spawnEnemy();
          if (lives <= 0) {
            updateUI();
            gameOver();
            return;
          }
          continue;
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        let bulletRemoved = false;

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];

          if (hitCircle(b, e)) {
            bullets.splice(i, 1);
            bulletRemoved = true;

            e.hp -= b.damage;
            spawnExplosion(b.x, b.y, "#ffe66d", 6);

            if (e.hp <= 0) {
              const points = e.type === "heavy" ? 70 : e.type === "shooter" ? 45 : 25;
              score += points;
              spawnExplosion(e.x, e.y, e.type === "heavy" ? "#b56dff" : "#ff347c", e.type === "heavy" ? 34 : 22);
              spawnPowerup(e.x, e.y);
              enemies.splice(j, 1);
              spawnEnemy();

              if (score > 0 && Math.floor(score / 500) + 1 > wave) {
                wave = Math.floor(score / 500) + 1;
                for (let k = 0; k < Math.min(3, wave); k++) spawnEnemy();
              }
            }

            break;
          }
        }

        if (bulletRemoved) continue;
      }

      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy * dt;
        p.spin += dt * 6;

        if (p.y > H + 20) {
          powerups.splice(i, 1);
          continue;
        }

        if (hitCircle(player, p)) {
          if (p.type === "power") {
            player.powerTimer = 8;
            score += 35;
            spawnExplosion(p.x, p.y, "#00eaff", 16);
          } else {
            lives = Math.min(5, lives + 1);
            score += 50;
            spawnExplosion(p.x, p.y, "#3cff8f", 16);
          }
          powerups.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.975;
        p.vy *= 0.975;

        if (p.life <= 0) particles.splice(i, 1);
      }

      updateUI();
    }

    function drawBackground() {
      const grd = ctx.createLinearGradient(0, 0, 0, H);
      grd.addColorStop(0, "#030716");
      grd.addColorStop(0.55, "#061237");
      grd.addColorStop(1, "#02030b");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      for (const star of stars) {
        ctx.globalAlpha = star.alpha;
        ctx.fillStyle = "#d9fbff";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPlayer() {
      if (!player) return;

      const blink = player.invincible > 0 && Math.floor(performance.now() / 90) % 2 === 0;
      if (blink) ctx.globalAlpha = 0.42;

      ctx.save();
      ctx.translate(player.x, player.y);

      const glow = ctx.createRadialGradient(0, 5, 2, 0, 5, 38);
      glow.addColorStop(0, "rgba(0,234,255,0.55)");
      glow.addColorStop(1, "rgba(0,234,255,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 7, 40, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#00eaff";
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(17, 19);
      ctx.lineTo(0, 11);
      ctx.lineTo(-17, 19);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(7, 8);
      ctx.lineTo(0, 4);
      ctx.lineTo(-7, 8);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = player.powerTimer > 0 ? "#ffe66d" : "#ff347c";
      ctx.beginPath();
      ctx.moveTo(-9, 18);
      ctx.lineTo(0, 32 + Math.random() * 8);
      ctx.lineTo(9, 18);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);

      const color = e.type === "heavy" ? "#b56dff" : e.type === "shooter" ? "#ffb13c" : "#ff347c";

      ctx.shadowColor = color;
      ctx.shadowBlur = 14;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, e.r);
      ctx.lineTo(e.r * 0.9, -e.r * 0.4);
      ctx.lineTo(e.r * 0.35, -e.r);
      ctx.lineTo(0, -e.r * 0.55);
      ctx.lineTo(-e.r * 0.35, -e.r);
      ctx.lineTo(-e.r * 0.9, -e.r * 0.4);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#fff";
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(0, -e.r * 0.15, e.r * 0.23, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;

      if (e.maxHp > 1) {
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(-e.r, e.r + 6, e.r * 2, 4);
        ctx.fillStyle = "#3cff8f";
        ctx.fillRect(-e.r, e.r + 6, (e.r * 2) * (e.hp / e.maxHp), 4);
      }

      ctx.restore();
    }

    function draw() {
      drawBackground();

      for (const p of powerups) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin);

        ctx.shadowBlur = 18;
        ctx.shadowColor = p.type === "life" ? "#3cff8f" : "#00eaff";
        ctx.strokeStyle = p.type === "life" ? "#3cff8f" : "#00eaff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 15px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.type === "life" ? "+" : "★", 0, 1);

        ctx.restore();
      }

      for (const b of bullets) {
        ctx.shadowColor = "#ffe66d";
        ctx.shadowBlur = 14;
        ctx.fillStyle = "#fff6a6";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,230,109,0.24)";
        ctx.fillRect(b.x - 1.5, b.y, 3, 26);
      }

      for (const b of enemyBullets) {
        ctx.shadowColor = "#ff347c";
        ctx.shadowBlur = 15;
        ctx.fillStyle = "#ff75a6";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      for (const e of enemies) drawEnemy(e);

      drawPlayer();

      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      if (player && player.powerTimer > 0) {
        ctx.fillStyle = "rgba(0,234,255,0.85)";
        ctx.font = "bold 13px Arial";
        ctx.textAlign = "center";
        ctx.fillText("TRIPLE SHOT " + Math.ceil(player.powerTimer), W / 2, 72);
      }
    }

    function loop(now) {
      if (!gameRunning) return;

      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      update(dt);
      draw();

      animationId = requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resize);

    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    canvas.addEventListener("pointerdown", (e) => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      pointerDown = true;
      pointerX = e.clientX - rect.left;
      pointerY = e.clientY - rect.top;
      canvas.setPointerCapture(e.pointerId);
      shoot();
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      pointerX = e.clientX - rect.left;
      pointerY = e.clientY - rect.top;
    });

    canvas.addEventListener("pointerup", (e) => {
      pointerDown = false;
      try {
        canvas.releasePointerCapture(e.pointerId);
      } catch (err) {}
    });

    canvas.addEventListener("pointercancel", () => {
      pointerDown = false;
    });

    startButton.addEventListener("click", startGame);

    resize();
    createStars();
    bestScoreEl.textContent = bestScore;
    finalScoreEl.textContent = "0";
    draw();
  </script>
</body>
</html>
