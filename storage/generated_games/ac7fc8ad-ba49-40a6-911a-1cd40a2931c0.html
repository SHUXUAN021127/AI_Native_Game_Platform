<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #243b55, #141e30);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(95vw, 520px);
      text-align: center;
      padding: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      letter-spacing: 2px;
      color: #7cff6b;
      text-shadow: 0 0 12px rgba(124, 255, 107, 0.6);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    .info-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.04);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111827;
      border: 4px solid #7cff6b;
      border-radius: 18px;
      box-shadow:
        0 0 25px rgba(124, 255, 107, 0.35),
        inset 0 0 30px rgba(0, 0, 0, 0.45);
      touch-action: none;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 70px);
      grid-template-rows: repeat(2, 58px);
      gap: 8px;
      justify-content: center;
    }

    .controls button,
    .restart {
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #7cff6b, #35b82b);
      color: #062b04;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #1e7f18;
      transition: transform 0.05s, box-shadow 0.05s;
      user-select: none;
    }

    .controls button:active,
    .restart:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #1e7f18;
    }

    .up {
      grid-column: 2;
      grid-row: 1;
    }

    .left {
      grid-column: 1;
      grid-row: 2;
    }

    .down {
      grid-column: 2;
      grid-row: 2;
    }

    .right {
      grid-column: 3;
      grid-row: 2;
    }

    .restart {
      margin-top: 14px;
      padding: 12px 22px;
      font-size: 18px;
    }

    .message {
      min-height: 26px;
      margin-top: 10px;
      font-size: 16px;
      color: #d1ffd0;
    }

    @media (max-height: 720px) {
      h1 {
        font-size: 30px;
        margin-bottom: 6px;
      }

      .game-wrapper {
        padding: 8px;
      }

      .controls {
        grid-template-columns: repeat(3, 58px);
        grid-template-rows: repeat(2, 48px);
        margin-top: 10px;
      }

      .restart {
        margin-top: 8px;
        padding: 9px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>SNAKE</h1>

    <div class="info-bar">
      <div class="info-box">Score: <span id="score">0</span></div>
      <div class="info-box">Best: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="480" height="480" aria-label="Snake game"></canvas>

    <div class="message" id="message">Use arrow keys, WASD, swipe, or buttons.</div>

    <div class="controls" aria-label="Touch controls">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <button class="down" data-dir="down">▼</button>
      <button class="right" data-dir="right">▶</button>
    </div>

    <button class="restart" id="restart">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restart");

    const gridSize = 24;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best;
    let gameOver;
    let paused;
    let lastTime;
    let moveInterval;
    let accumulator;

    best = Number(localStorage.getItem("snakeBestScore")) || 0;
    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };

      score = 0;
      gameOver = false;
      paused = false;
      lastTime = 0;
      accumulator = 0;
      moveInterval = 115;

      scoreEl.textContent = score;
      messageEl.textContent = "Use arrow keys, WASD, swipe, or buttons.";
      placeFood();
      draw();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function changeDirection(newDir) {
      if (gameOver) {
        resetGame();
        return;
      }

      if (paused) paused = false;

      const dirs = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      const chosen = dirs[newDir];
      if (!chosen) return;

      if (chosen.x === -direction.x && chosen.y === -direction.y) return;

      nextDirection = chosen;
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          localStorage.setItem("snakeBestScore", best);
          bestEl.textContent = best;
        }

        moveInterval = Math.max(65, moveInterval - 2);
        placeFood();
      } else {
        snake.pop();
      }
    }

    function endGame() {
      gameOver = true;
      messageEl.textContent = "Game over! Press Restart or any direction to play again.";
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.035)";
      ctx.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bgGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bgGradient.addColorStop(0, "#111827");
      bgGradient.addColorStop(1, "#07111f");
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      drawFood();
      drawSnake();

      if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 44px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 15);

        ctx.font = "22px Arial";
        ctx.fillStyle = "#7cff6b";
        ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 + 25);
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const x = segment.x * gridSize;
        const y = segment.y * gridSize;
        const padding = index === 0 ? 2 : 3;

        if (index === 0) {
          ctx.fillStyle = "#b7ff82";
        } else {
          const shade = Math.max(120, 230 - index * 6);
          ctx.fillStyle = `rgb(${Math.floor(shade * 0.45)}, ${shade}, ${Math.floor(shade * 0.35)})`;
        }

        roundRect(
          ctx,
          x + padding,
          y + padding,
          gridSize - padding * 2,
          gridSize - padding * 2,
          7
        );
        ctx.fill();

        if (index === 0) {
          drawEyes(segment);
        }
      });
    }

    function drawEyes(head) {
      const cx = head.x * gridSize;
      const cy = head.y * gridSize;

      let eye1;
      let eye2;

      if (direction.x === 1) {
        eye1 = { x: cx + 16, y: cy + 7 };
        eye2 = { x: cx + 16, y: cy + 17 };
      } else if (direction.x === -1) {
        eye1 = { x: cx + 8, y: cy + 7 };
        eye2 = { x: cx + 8, y: cy + 17 };
      } else if (direction.y === -1) {
        eye1 = { x: cx + 7, y: cy + 8 };
        eye2 = { x: cx + 17, y: cy + 8 };
      } else {
        eye1 = { x: cx + 7, y: cy + 16 };
        eye2 = { x: cx + 17, y: cy + 16 };
      }

      ctx.fillStyle = "#07220a";
      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(eye2.x, eye2.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const centerX = food.x * gridSize + gridSize / 2;
      const centerY = food.y * gridSize + gridSize / 2;

      ctx.fillStyle = "#ff4d5e";
      ctx.beginPath();
      ctx.arc(centerX, centerY, gridSize * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
      ctx.beginPath();
      ctx.arc(centerX - 4, centerY - 4, gridSize * 0.12, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#35c759";
      ctx.beginPath();
      ctx.ellipse(centerX + 5, centerY - 10, 5, 3, -0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = timestamp - lastTime;
      lastTime = timestamp;

      if (!gameOver && !paused) {
        accumulator += delta;

        while (accumulator >= moveInterval) {
          update();
          accumulator -= moveInterval;
        }
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (["arrowup", "w"].includes(key)) {
        event.preventDefault();
        changeDirection("up");
      } else if (["arrowdown", "s"].includes(key)) {
        event.preventDefault();
        changeDirection("down");
      } else if (["arrowleft", "a"].includes(key)) {
        event.preventDefault();
        changeDirection("left");
      } else if (["arrowright", "d"].includes(key)) {
        event.preventDefault();
        changeDirection("right");
      } else if (key === " " || key === "p") {
        if (!gameOver) {
          paused = !paused;
          messageEl.textContent = paused ? "Paused. Press Space or P to resume." : "Use arrow keys, WASD, swipe, or buttons.";
        }
      } else if (key === "enter") {
        resetGame();
      }
    });

    document.querySelectorAll(".controls button").forEach(button => {
      button.addEventListener("click", () => {
        changeDirection(button.dataset.dir);
      });
    });

    restartBtn.addEventListener("click", resetGame);

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", event => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", event => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        changeDirection(dx > 0 ? "right" : "left");
      } else {
        changeDirection(dy > 0 ? "down" : "up");
      }

      event.preventDefault();
    }, { passive: false });

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
