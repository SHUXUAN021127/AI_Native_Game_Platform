<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>开心消消乐</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.55), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.45), transparent 22%),
        linear-gradient(135deg, #ff9ad5, #8fd3ff 55%, #ffe17d);
      overflow: hidden;
    }

    .game {
      width: min(94vw, 520px);
      padding: 18px;
      border-radius: 28px;
      background: rgba(255,255,255,.35);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(111, 55, 155, .35);
      border: 2px solid rgba(255,255,255,.55);
      position: relative;
    }

    .title {
      margin: 0 0 12px;
      text-align: center;
      color: #fff;
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 900;
      text-shadow: 0 4px 0 #ff63a8, 0 8px 18px rgba(0,0,0,.22);
      letter-spacing: 2px;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: rgba(255,255,255,.8);
      border-radius: 18px;
      padding: 10px 8px;
      text-align: center;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.08), 0 5px 14px rgba(0,0,0,.12);
      color: #7044b5;
      font-weight: 800;
    }

    .stat span {
      display: block;
      color: #ff4d99;
      font-size: 22px;
      margin-top: 2px;
    }

    .board-wrap {
      padding: 10px;
      border-radius: 24px;
      background: rgba(79, 45, 153, .35);
      box-shadow: inset 0 0 20px rgba(0,0,0,.18);
    }

    #board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 6px;
    }

    .cell {
      position: relative;
      border-radius: 17px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: clamp(24px, 8vw, 43px);
      background: linear-gradient(145deg, rgba(255,255,255,.92), rgba(255,255,255,.55));
      box-shadow:
        inset 0 -5px 0 rgba(0,0,0,.12),
        inset 0 3px 0 rgba(255,255,255,.75),
        0 4px 8px rgba(42, 20, 91, .2);
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }

    .cell:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .cell.selected {
      transform: scale(1.1);
      box-shadow:
        0 0 0 4px #fff,
        0 0 0 8px #ffeb3b,
        0 8px 18px rgba(0,0,0,.22);
      z-index: 5;
    }

    .cell.pop {
      animation: pop .32s ease forwards;
    }

    .cell.hint {
      animation: hint 1s infinite;
    }

    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      45% { transform: scale(1.35) rotate(8deg); opacity: 1; }
      100% { transform: scale(.15) rotate(-20deg); opacity: 0; }
    }

    @keyframes hint {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); box-shadow: 0 0 0 4px #fff176, 0 0 18px #fff176; }
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 13px 10px;
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,.18), 0 6px 14px rgba(0,0,0,.18);
      transition: transform .12s ease, filter .12s ease;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.18), 0 3px 8px rgba(0,0,0,.18);
    }

    #newGame {
      background: linear-gradient(#ff7ab8, #ff3f92);
    }

    #hintBtn {
      background: linear-gradient(#7cddff, #3d8dff);
    }

    .message {
      margin-top: 12px;
      min-height: 24px;
      text-align: center;
      color: #fff;
      font-weight: 900;
      text-shadow: 0 2px 7px rgba(0,0,0,.25);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: rgba(49, 28, 92, .58);
      backdrop-filter: blur(4px);
      z-index: 20;
      padding: 20px;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(88%, 360px);
      padding: 26px 18px;
      text-align: center;
      border-radius: 26px;
      background: #fff;
      color: #7044b5;
      box-shadow: 0 16px 45px rgba(0,0,0,.3);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #ff4d99;
    }

    .modal p {
      margin: 8px 0 18px;
      font-size: 18px;
      font-weight: 800;
    }

    .modal button {
      width: 100%;
      background: linear-gradient(#ffd86b, #ff9f1c);
    }

    .float-score {
      position: fixed;
      color: #fff;
      font-weight: 900;
      font-size: 24px;
      pointer-events: none;
      text-shadow: 0 3px 8px rgba(0,0,0,.35);
      animation: floatUp .8s ease forwards;
      z-index: 50;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(-48px) scale(1.25); opacity: 0; }
    }

    @media (max-width: 420px) {
      .game {
        padding: 12px;
      }

      #board {
        gap: 4px;
      }

      .cell {
        border-radius: 12px;
      }

      .panel {
        gap: 7px;
      }

      .stat {
        font-size: 13px;
        border-radius: 14px;
      }

      .stat span {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <h1 class="title">开心消消乐</h1>

    <div class="panel">
      <div class="stat">分数<span id="score">0</span></div>
      <div class="stat">步数<span id="moves">30</span></div>
      <div class="stat">目标<span id="target">3000</span></div>
    </div>

    <div class="board-wrap">
      <div id="board" aria-label="开心消消乐棋盘"></div>
    </div>

    <div class="controls">
      <button id="newGame">重新开始</button>
      <button id="hintBtn">提示一下</button>
    </div>

    <div class="message" id="message">交换相邻方块，三个及以上即可消除！</div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 id="resultTitle">恭喜！</h2>
        <p id="resultText">你完成了目标！</p>
        <button id="playAgain">再玩一局</button>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 8;
    const TYPES = ["🍓", "🍊", "🍋", "🍇", "🥝", "🍬"];
    const TARGET = 3000;
    const START_MOVES = 30;

    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const movesEl = document.getElementById("moves");
    const targetEl = document.getElementById("target");
    const messageEl = document.getElementById("message");
    const overlayEl = document.getElementById("overlay");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultTextEl = document.getElementById("resultText");

    let board = [];
    let score = 0;
    let moves = START_MOVES;
    let selected = null;
    let locked = false;
    let gameOver = false;
    let hintCells = [];

    targetEl.textContent = TARGET;

    function randomType() {
      return Math.floor(Math.random() * TYPES.length);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function idx(r, c) {
      return r * SIZE + c;
    }

    function row(i) {
      return Math.floor(i / SIZE);
    }

    function col(i) {
      return i % SIZE;
    }

    function adjacent(a, b) {
      return Math.abs(row(a) - row(b)) + Math.abs(col(a) - col(b)) === 1;
    }

    function createBoard() {
      board = new Array(SIZE * SIZE).fill(0);

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          let t;
          do {
            t = randomType();
          } while (
            (c >= 2 && board[idx(r, c - 1)] === t && board[idx(r, c - 2)] === t) ||
            (r >= 2 && board[idx(r - 1, c)] === t && board[idx(r - 2, c)] === t)
          );
          board[idx(r, c)] = t;
        }
      }

      if (!hasPossibleMove()) createBoard();
    }

    function render(popSet = new Set()) {
      boardEl.innerHTML = "";

      board.forEach((type, i) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;

        if (type !== null && type !== undefined) {
          cell.textContent = TYPES[type];
        }

        if (selected === i) cell.classList.add("selected");
        if (popSet.has(i)) cell.classList.add("pop");
        if (hintCells.includes(i)) cell.classList.add("hint");

        boardEl.appendChild(cell);
      });

      scoreEl.textContent = score;
      movesEl.textContent = moves;
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function findMatches(testBoard = board) {
      const matched = new Set();

      for (let r = 0; r < SIZE; r++) {
        let count = 1;
        for (let c = 1; c <= SIZE; c++) {
          const cur = c < SIZE ? testBoard[idx(r, c)] : Symbol("end");
          const prev = testBoard[idx(r, c - 1)];

          if (cur !== null && cur === prev) {
            count++;
          } else {
            if (prev !== null && count >= 3) {
              for (let k = 0; k < count; k++) matched.add(idx(r, c - 1 - k));
            }
            count = 1;
          }
        }
      }

      for (let c = 0; c < SIZE; c++) {
        let count = 1;
        for (let r = 1; r <= SIZE; r++) {
          const cur = r < SIZE ? testBoard[idx(r, c)] : Symbol("end");
          const prev = testBoard[idx(r - 1, c)];

          if (cur !== null && cur === prev) {
            count++;
          } else {
            if (prev !== null && count >= 3) {
              for (let k = 0; k < count; k++) matched.add(idx(r - 1 - k, c));
            }
            count = 1;
          }
        }
      }

      return matched;
    }

    function swap(a, b, arr = board) {
      const temp = arr[a];
      arr[a] = arr[b];
      arr[b] = temp;
    }

    function applyGravity() {
      for (let c = 0; c < SIZE; c++) {
        const stack = [];

        for (let r = SIZE - 1; r >= 0; r--) {
          const value = board[idx(r, c)];
          if (value !== null) stack.push(value);
        }

        for (let r = SIZE - 1; r >= 0; r--) {
          board[idx(r, c)] = stack.length ? stack.shift() : randomType();
        }
      }
    }

    function findPossibleMove() {
      for (let i = 0; i < board.length; i++) {
        const neighbors = [];
        if (col(i) < SIZE - 1) neighbors.push(i + 1);
        if (row(i) < SIZE - 1) neighbors.push(i + SIZE);

        for (const n of neighbors) {
          const copy = board.slice();
          swap(i, n, copy);
          if (findMatches(copy).size > 0) return [i, n];
        }
      }
      return null;
    }

    function hasPossibleMove() {
      return !!findPossibleMove();
    }

    function floatScore(points) {
      const rect = boardEl.getBoundingClientRect();
      const el = document.createElement("div");
      el.className = "float-score";
      el.textContent = "+" + points;
      el.style.left = rect.left + rect.width / 2 - 28 + "px";
      el.style.top = rect.top + rect.height / 2 - 10 + "px";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 850);
    }

    async function processMatches() {
      locked = true;
      selected = null;
      hintCells = [];

      let combo = 1;
      let totalRemoved = 0;

      while (true) {
        const matches = findMatches();

        if (matches.size === 0) break;

        render(matches);
        await sleep(310);

        matches.forEach(i => board[i] = null);

        const gained = matches.size * 10 * combo;
        score += gained;
        totalRemoved += matches.size;
        floatScore(gained);

        setMessage(combo > 1 ? "连锁消除 x" + combo + "！" : "太棒了，消除成功！");
        render();
        await sleep(120);

        applyGravity();
        render();
        await sleep(220);

        combo++;
      }

      if (totalRemoved > 0) {
        setMessage("本轮消除了 " + totalRemoved + " 个，继续加油！");
      }

      if (score >= TARGET) {
        endGame(true);
        return;
      }

      if (moves <= 0) {
        endGame(false);
        return;
      }

      if (!hasPossibleMove()) {
        setMessage("没有可消除的走法，已自动重排！");
        await sleep(350);
        createBoard();
      }

      locked = false;
      render();
    }

    function endGame(win) {
      locked = true;
      gameOver = true;
      overlayEl.classList.add("show");

      if (win) {
        resultTitleEl.textContent = "闯关成功！";
        resultTextEl.textContent = "最终得分：" + score + "，你太厉害啦！";
      } else {
        resultTitleEl.textContent = "步数用完";
        resultTextEl.textContent = "最终得分：" + score + "，再试一次吧！";
      }
    }

    async function handleCellClick(index) {
      if (locked || gameOver) return;

      hintCells = [];

      if (selected === null) {
        selected = index;
        render();
        return;
      }

      if (selected === index) {
        selected = null;
        render();
        return;
      }

      if (!adjacent(selected, index)) {
        selected = index;
        render();
        return;
      }

      locked = true;
      const first = selected;
      const second = index;

      swap(first, second);
      selected = null;
      render();
      await sleep(150);

      const matches = findMatches();

      if (matches.size === 0) {
        setMessage("没有形成三个相同，换回来啦！");
        await sleep(120);
        swap(first, second);
        render();
        locked = false;
        return;
      }

      moves--;
      render();
      await processMatches();
    }

    function showHint() {
      if (locked || gameOver) return;

      const move = findPossibleMove();
      hintCells = [];

      if (move) {
        hintCells = move;
        setMessage("试试交换闪光的两个方块！");
      } else {
        setMessage("暂时没有可用走法，正在重排！");
        createBoard();
      }

      render();

      setTimeout(() => {
        hintCells = [];
        render();
      }, 2200);
    }

    function restart() {
      score = 0;
      moves = START_MOVES;
      selected = null;
      locked = false;
      gameOver = false;
      hintCells = [];
      overlayEl.classList.remove("show");
      setMessage("交换相邻方块，三个及以上即可消除！");
      createBoard();
      render();
    }

    boardEl.addEventListener("click", e => {
      const cell = e.target.closest(".cell");
      if (!cell) return;
      handleCellClick(Number(cell.dataset.index));
    });

    document.getElementById("newGame").addEventListener("click", restart);
    document.getElementById("hintBtn").addEventListener("click", showHint);
    document.getElementById("playAgain").addEventListener("click", restart);

    restart();
  </script>
</body>
</html>
