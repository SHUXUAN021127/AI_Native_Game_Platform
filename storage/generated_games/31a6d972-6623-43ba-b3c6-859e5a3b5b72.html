<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f2937, #020617 70%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(95vw, 560px);
      padding: 22px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), inset 0 0 0 1px rgba(255,255,255,0.08);
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.2rem);
      letter-spacing: 3px;
      margin-bottom: 14px;
      color: #22c55e;
      text-shadow: 0 0 16px rgba(34, 197, 94, 0.6);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .hud-card {
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      padding: 10px 8px;
    }

    .hud-label {
      display: block;
      font-size: 0.74rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 1.35rem;
      font-weight: bold;
      color: #f8fafc;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
      border: 3px solid rgba(34, 197, 94, 0.7);
      box-shadow: inset 0 0 28px rgba(34, 197, 94, 0.12), 0 0 28px rgba(34, 197, 94, 0.16);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #020617;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      background: rgba(2, 6, 23, 0.74);
      backdrop-filter: blur(3px);
      transition: opacity 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-title {
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: bold;
      color: #f8fafc;
      text-shadow: 0 0 18px rgba(34, 197, 94, 0.55);
    }

    .overlay-text {
      max-width: 360px;
      line-height: 1.45;
      color: #cbd5e1;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      color: #04130a;
      background: linear-gradient(135deg, #22c55e, #86efac);
      box-shadow: 0 8px 22px rgba(34, 197, 94, 0.25);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    .secondary {
      background: linear-gradient(135deg, #38bdf8, #bae6fd);
      box-shadow: 0 8px 22px rgba(56, 189, 248, 0.18);
    }

    .instructions {
      margin-top: 14px;
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .mobile-controls {
      display: none;
      margin-top: 16px;
      grid-template-columns: 64px 64px 64px;
      grid-template-rows: 52px 52px;
      gap: 8px;
      justify-content: center;
    }

    .control-btn {
      padding: 0;
      border-radius: 16px;
      background: rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.35);
      box-shadow: none;
      font-size: 1.4rem;
    }

    .control-btn.up {
      grid-column: 2;
      grid-row: 1;
    }

    .control-btn.left {
      grid-column: 1;
      grid-row: 2;
    }

    .control-btn.down {
      grid-column: 2;
      grid-row: 2;
    }

    .control-btn.right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (max-width: 700px) {
      body {
        align-items: flex-start;
        padding-top: 10px;
      }

      .game-wrapper {
        padding: 14px;
      }

      .mobile-controls {
        display: grid;
      }

      .instructions {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrapper">
    <h1>SNAKE</h1>

    <section class="hud">
      <div class="hud-card">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-card">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="best">0</span>
      </div>
      <div class="hud-card">
        <span class="hud-label">Level</span>
        <span class="hud-value" id="level">1</span>
      </div>
    </section>

    <div class="canvas-container">
      <canvas id="game" width="520" height="520"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">Snake Game</div>
        <p class="overlay-text" id="overlayText">
          Eat the red apples, grow longer, and avoid crashing into walls or yourself.
        </p>
        <div class="buttons">
          <button id="startBtn">Start Game</button>
          <button class="secondary" id="pauseBtn">Pause</button>
        </div>
      </div>
    </div>

    <div class="mobile-controls" aria-label="Mobile controls">
      <button class="control-btn up" data-dir="up">▲</button>
      <button class="control-btn left" data-dir="left">◀</button>
      <button class="control-btn down" data-dir="down">▼</button>
      <button class="control-btn right" data-dir="right">▶</button>
    </div>

    <p class="instructions">
      Controls: Arrow Keys or WASD. Press Space to pause/resume. Swipe on mobile.
    </p>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const levelEl = document.getElementById("level");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    const gridSize = 26;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem("snakeBestScore") || 0);
    let level;
    let gameSpeed;
    let gameLoop;
    let running = false;
    let paused = false;
    let gameOver = false;

    bestEl.textContent = bestScore;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      level = 1;
      gameSpeed = 135;
      running = true;
      paused = false;
      gameOver = false;
      placeFood();
      updateHUD();
      hideOverlay();
      clearInterval(gameLoop);
      gameLoop = setInterval(update, gameSpeed);
      draw();
    }

    function update() {
      if (!running || paused || gameOver) return;

      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        level = Math.floor(score / 50) + 1;
        placeFood();
        updateHUD();
        updateSpeed();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      drawBoard();
      drawFood();
      drawSnake();
    }

    function drawBoard() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < tileCount; y++) {
        for (let x = 0; x < tileCount; x++) {
          if ((x + y) % 2 === 0) {
            ctx.fillStyle = "#07111f";
          } else {
            ctx.fillStyle = "#091426";
          }
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }

      ctx.strokeStyle = "rgba(148, 163, 184, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const px = segment.x * gridSize;
        const py = segment.y * gridSize;
        const inset = index === 0 ? 2 : 3;

        const gradient = ctx.createLinearGradient(px, py, px + gridSize, py + gridSize);
        if (index === 0) {
          gradient.addColorStop(0, "#86efac");
          gradient.addColorStop(1, "#16a34a");
        } else {
          gradient.addColorStop(0, "#22c55e");
          gradient.addColorStop(1, "#15803d");
        }

        ctx.fillStyle = gradient;
        roundRect(px + inset, py + inset, gridSize - inset * 2, gridSize - inset * 2, 7);
        ctx.fill();

        if (index === 0) {
          drawEyes(segment);
        }
      });
    }

    function drawEyes(head) {
      const centerX = head.x * gridSize + gridSize / 2;
      const centerY = head.y * gridSize + gridSize / 2;

      let eye1 = { x: centerX - 5, y: centerY - 5 };
      let eye2 = { x: centerX - 5, y: centerY + 5 };

      if (direction.x === -1) {
        eye1 = { x: centerX - 5, y: centerY - 5 };
        eye2 = { x: centerX - 5, y: centerY + 5 };
      } else if (direction.x === 1) {
        eye1 = { x: centerX + 5, y: centerY - 5 };
        eye2 = { x: centerX + 5, y: centerY + 5 };
      } else if (direction.y === -1) {
        eye1 = { x: centerX - 5, y: centerY - 5 };
        eye2 = { x: centerX + 5, y: centerY - 5 };
      } else if (direction.y === 1) {
        eye1 = { x: centerX - 5, y: centerY + 5 };
        eye2 = { x: centerX + 5, y: centerY + 5 };
      }

      ctx.fillStyle = "#052e16";
      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eye2.x, eye2.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const cx = food.x * gridSize + gridSize / 2;
      const cy = food.y * gridSize + gridSize / 2;

      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.arc(cx, cy, gridSize * 0.36, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fca5a5";
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 5, gridSize * 0.11, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#78350f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx + 1, cy - 8);
      ctx.lineTo(cx + 5, cy - 13);
      ctx.stroke();

      ctx.fillStyle = "#22c55e";
      ctx.beginPath();
      ctx.ellipse(cx + 9, cy - 12, 5, 3, -0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function updateHUD() {
      scoreEl.textContent = score;
      levelEl.textContent = level;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snakeBestScore", bestScore);
      }

      bestEl.textContent = bestScore;
    }

    function updateSpeed() {
      const newSpeed = Math.max(55, 135 - (level - 1) * 10);
      if (newSpeed !== gameSpeed) {
        gameSpeed = newSpeed;
        clearInterval(gameLoop);
        gameLoop = setInterval(update, gameSpeed);
      }
    }

    function changeDirection(newDir) {
      if (!running || paused || gameOver) return;

      const dirs = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      const chosen = dirs[newDir];
      if (!chosen) return;

      if (chosen.x === -direction.x && chosen.y === -direction.y) return;

      nextDirection = chosen;
    }

    function togglePause() {
      if (!running || gameOver) return;

      paused = !paused;

      if (paused) {
        showOverlay("Paused", "Press Space or tap Resume to continue.", "Resume");
      } else {
        hideOverlay();
      }
    }

    function endGame() {
      gameOver = true;
      running = false;
      clearInterval(gameLoop);
      updateHUD();
      draw();
      showOverlay("Game Over", "Final Score: " + score + ". Try again and beat your best score!", "Play Again");
    }

    function showOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startBtn.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    startBtn.addEventListener("click", () => {
      if (paused && !gameOver) {
        paused = false;
        hideOverlay();
      } else {
        resetGame();
      }
    });

    pauseBtn.addEventListener("click", togglePause);

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
        e.preventDefault();
      }

      if (key === "arrowup" || key === "w") changeDirection("up");
      if (key === "arrowdown" || key === "s") changeDirection("down");
      if (key === "arrowleft" || key === "a") changeDirection("left");
      if (key === "arrowright" || key === "d") changeDirection("right");
      if (key === " ") {
        if (!running || gameOver) resetGame();
        else togglePause();
      }
    });

    document.querySelectorAll(".control-btn").forEach(btn => {
      btn.addEventListener("click", () => changeDirection(btn.dataset.dir));
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {
      const touch = e.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", (e) => {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        changeDirection(dx > 0 ? "right" : "left");
      } else {
        changeDirection(dy > 0 ? "down" : "up");
      }
    }, { passive: true });

    drawBoard();

    ctx.fillStyle = "rgba(34, 197, 94, 0.9)";
    ctx.font = "bold 38px Arial";
    ctx.textAlign = "center";
    ctx.fillText("SNAKE", canvas.width / 2, canvas.height / 2 - 10);

    ctx.fillStyle = "rgba(203, 213, 225, 0.9)";
    ctx.font = "18px Arial";
    ctx.fillText("Press Start to Play", canvas.width / 2, canvas.height / 2 + 28);
  </script>
</body>
</html>
