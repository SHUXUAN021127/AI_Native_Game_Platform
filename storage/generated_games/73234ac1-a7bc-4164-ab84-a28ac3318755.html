<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Super Plumber Platformer</title>
<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(#6fd3ff, #b8efff);
    font-family: Arial, Helvetica, sans-serif;
  }

  #gameWrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 15% 18%, rgba(255,255,255,.85) 0 35px, transparent 36px),
      radial-gradient(circle at 20% 18%, rgba(255,255,255,.85) 0 45px, transparent 46px),
      radial-gradient(circle at 25% 18%, rgba(255,255,255,.85) 0 35px, transparent 36px),
      linear-gradient(#63cfff 0%, #9ee9ff 70%, #b6f7a3 70%, #79d85f 100%);
  }

  canvas {
    width: min(100vw, 960px);
    height: min(56.25vw, 540px);
    max-height: 100vh;
    max-width: 177.77vh;
    image-rendering: pixelated;
    border: 6px solid #ffffff;
    border-radius: 14px;
    box-shadow: 0 15px 40px rgba(0,0,0,.35);
    background: #70d7ff;
  }

  #hud {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: min(920px, calc(100vw - 30px));
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    color: white;
    font-weight: 900;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    font-size: clamp(14px, 2.4vw, 24px);
    pointer-events: none;
    z-index: 5;
  }

  #message {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 6;
  }

  #messageBox {
    display: none;
    text-align: center;
    color: white;
    background: rgba(0, 0, 0, .72);
    border: 4px solid white;
    border-radius: 18px;
    padding: 24px 34px;
    box-shadow: 0 10px 30px rgba(0,0,0,.45);
    text-shadow: 2px 2px #000;
  }

  #messageBox h1 {
    margin: 0 0 10px;
    font-size: clamp(30px, 7vw, 68px);
  }

  #messageBox p {
    margin: 8px 0;
    font-size: clamp(16px, 3vw, 26px);
    font-weight: bold;
  }

  #controls {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 22px;
    z-index: 8;
    pointer-events: none;
  }

  .pad {
    display: flex;
    gap: 14px;
    pointer-events: auto;
  }

  .btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 4px solid white;
    background: rgba(0,0,0,.35);
    color: white;
    font-size: 28px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 rgba(0,0,0,.35);
  }

  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,.35);
    background: rgba(255,255,255,.22);
  }

  #restart {
    position: absolute;
    right: 18px;
    bottom: 18px;
    z-index: 9;
    border: 3px solid white;
    border-radius: 12px;
    background: #e63737;
    color: white;
    font-weight: 900;
    font-size: 15px;
    padding: 10px 14px;
    box-shadow: 0 5px 0 #8e1717;
    cursor: pointer;
  }

  #restart:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #8e1717;
  }

  @media (hover: none), (max-width: 820px) {
    #controls { display: flex; }
    #restart { bottom: 104px; }
  }
</style>
</head>
<body>
<div id="gameWrap">
  <div id="hud">
    <div>⭐ SCORE: <span id="score">0</span></div>
    <div>🪙 COINS: <span id="coins">0</span></div>
    <div>❤️ LIVES: <span id="lives">3</span></div>
    <div>⏱️ TIME: <span id="time">300</span></div>
  </div>

  <canvas id="game" width="960" height="540"></canvas>

  <div id="message">
    <div id="messageBox">
      <h1 id="msgTitle">SUPER PLUMBER</h1>
      <p id="msgText">Arrow Keys / WASD to move, Space to jump</p>
      <p>Collect coins, stomp bugs, reach the flag!</p>
    </div>
  </div>

  <div id="controls">
    <div class="pad">
      <div class="btn" data-key="ArrowLeft">◀</div>
      <div class="btn" data-key="ArrowRight">▶</div>
    </div>
    <div class="pad">
      <div class="btn" data-key="Space">▲</div>
    </div>
  </div>

  <button id="restart">RESTART</button>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const coinsEl = document.getElementById("coins");
  const livesEl = document.getElementById("lives");
  const timeEl = document.getElementById("time");
  const messageBox = document.getElementById("messageBox");
  const msgTitle = document.getElementById("msgTitle");
  const msgText = document.getElementById("msgText");

  const W = canvas.width;
  const H = canvas.height;
  const GRAVITY = 0.72;
  const FRICTION = 0.82;
  const LEVEL_W = 4200;
  const FLOOR_Y = 480;

  const keys = {};
  let cameraX = 0;
  let score = 0;
  let coinsGot = 0;
  let lives = 3;
  let timeLeft = 300;
  let state = "intro";
  let lastTime = 0;
  let timerAccum = 0;
  let particles = [];

  const startPos = { x: 80, y: 360 };

  const player = {
    x: startPos.x,
    y: startPos.y,
    w: 34,
    h: 52,
    vx: 0,
    vy: 0,
    speed: 0.72,
    maxSpeed: 6.2,
    jump: 15.4,
    grounded: false,
    face: 1,
    invincible: 0,
    big: false
  };

  const platforms = [
    {x:0, y:FLOOR_Y, w:620, h:80, type:"ground"},
    {x:700, y:FLOOR_Y, w:530, h:80, type:"ground"},
    {x:1320, y:FLOOR_Y, w:690, h:80, type:"ground"},
    {x:2110, y:FLOOR_Y, w:460, h:80, type:"ground"},
    {x:2680, y:FLOOR_Y, w:1520, h:80, type:"ground"},

    {x:320, y:380, w:150, h:28, type:"brick"},
    {x:560, y:310, w:110, h:28, type:"brick"},
    {x:830, y:370, w:180, h:28, type:"brick"},
    {x:1080, y:310, w:130, h:28, type:"brick"},
    {x:1450, y:390, w:130, h:28, type:"brick"},
    {x:1650, y:330, w:180, h:28, type:"brick"},
    {x:1940, y:270, w:120, h:28, type:"brick"},
    {x:2300, y:380, w:150, h:28, type:"brick"},
    {x:2520, y:310, w:130, h:28, type:"brick"},
    {x:2830, y:390, w:180, h:28, type:"brick"},
    {x:3080, y:330, w:150, h:28, type:"brick"},
    {x:3370, y:270, w:170, h:28, type:"brick"},

    {x:3580, y:430, w:50, h:50, type:"block"},
    {x:3630, y:380, w:50, h:100, type:"block"},
    {x:3680, y:330, w:50, h:150, type:"block"},
    {x:3730, y:280, w:50, h:200, type:"block"}
  ];

  const coins = [
    ...coinLine(350, 340, 5), ...coinLine(800, 330, 6), ...coinLine(1090, 270, 4),
    ...coinLine(1455, 350, 4), ...coinLine(1660, 290, 6), ...coinLine(1935, 230, 5),
    ...coinLine(2305, 340, 5), ...coinLine(2825, 350, 6), ...coinLine(3085, 290, 5),
    ...coinLine(3375, 230, 6), ...coinLine(3860, 410, 7)
  ];

  const enemies = [
    enemy(500, 436, 400, 610),
    enemy(930, 436, 760, 1180),
    enemy(1540, 436, 1350, 1880),
    enemy(2220, 436, 2130, 2550),
    enemy(2950, 436, 2760, 3260),
    enemy(3450, 436, 3200, 3520)
  ];

  const powerups = [
    {x:590, y:270, w:28, h:28, active:true, type:"mushroom", phase:0},
    {x:2545, y:270, w:28, h:28, active:true, type:"mushroom", phase:0}
  ];

  const flag = { x: 3990, y: 230, w: 36, h: 250 };

  function coinLine(x, y, n) {
    const arr = [];
    for (let i = 0; i < n; i++) arr.push({x:x + i * 38, y, r:12, got:false, spin:Math.random()*6});
    return arr;
  }

  function enemy(x, y, min, max) {
    return {x, y, w:36, h:32, vx:1.35, min, max, alive:true, squash:0};
  }

  function resetGame(full = true) {
    player.x = startPos.x;
    player.y = startPos.y;
    player.w = 34;
    player.h = 52;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
    player.face = 1;
    player.invincible = 90;
    player.big = false;
    cameraX = 0;
    particles = [];

    if (full) {
      score = 0;
      coinsGot = 0;
      lives = 3;
      timeLeft = 300;
      coins.forEach(c => c.got = false);
      enemies.splice(0, enemies.length,
        enemy(500, 436, 400, 610),
        enemy(930, 436, 760, 1180),
        enemy(1540, 436, 1350, 1880),
        enemy(2220, 436, 2130, 2550),
        enemy(2950, 436, 2760, 3260),
        enemy(3450, 436, 3200, 3520)
      );
      powerups.forEach(p => p.active = true);
    }

    updateHUD();
  }

  function updateHUD() {
    scoreEl.textContent = score;
    coinsEl.textContent = coinsGot;
    livesEl.textContent = lives;
    timeEl.textContent = timeLeft;
  }

  function showMessage(title, text, visible = true) {
    msgTitle.textContent = title;
    msgText.textContent = text;
    messageBox.style.display = visible ? "block" : "none";
  }

  function startGame() {
    if (state === "intro" || state === "gameover" || state === "win") {
      resetGame(true);
      state = "play";
      showMessage("", "", false);
    }
  }

  function loseLife() {
    if (player.invincible > 0 || state !== "play") return;

    if (player.big) {
      player.big = false;
      player.h = 52;
      player.invincible = 120;
      burst(player.x + player.w/2, player.y + player.h/2, "#ffef45", 18);
      return;
    }

    lives--;
    updateHUD();
    burst(player.x + player.w/2, player.y + player.h/2, "#ff3333", 24);

    if (lives <= 0) {
      state = "gameover";
      showMessage("GAME OVER", "Press Enter or Restart to play again");
    } else {
      resetGame(false);
    }
  }

  function winGame() {
    state = "win";
    score += timeLeft * 10;
    updateHUD();
    showMessage("YOU WIN!", "Final Score: " + score + " — Press Enter to play again");
  }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx:(Math.random()-.5)*8,
        vy:(Math.random()-.9)*8,
        life:35 + Math.random()*25,
        color,
        size:3 + Math.random()*5
      });
    }
  }

  function rects(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function resolvePlatforms(obj) {
    obj.grounded = false;

    for (const p of platforms) {
      if (!rects(obj, p)) continue;

      const prevX = obj.x - obj.vx;
      const prevY = obj.y - obj.vy;

      if (prevY + obj.h <= p.y) {
        obj.y = p.y - obj.h;
        obj.vy = 0;
        obj.grounded = true;
      } else if (prevY >= p.y + p.h) {
        obj.y = p.y + p.h;
        obj.vy = 0;
      } else if (prevX + obj.w <= p.x) {
        obj.x = p.x - obj.w;
        obj.vx = 0;
      } else if (prevX >= p.x + p.w) {
        obj.x = p.x + p.w;
        obj.vx = 0;
      }
    }
  }

  function update(dt) {
    if (state !== "play") {
      updateParticles();
      return;
    }

    timerAccum += dt;
    if (timerAccum >= 1000) {
      timerAccum -= 1000;
      timeLeft--;
      if (timeLeft <= 0) {
        timeLeft = 0;
        loseLife();
      }
      updateHUD();
    }

    const left = keys.ArrowLeft || keys.KeyA;
    const right = keys.ArrowRight || keys.KeyD;
    const jump = keys.Space || keys.ArrowUp || keys.KeyW;

    if (left) {
      player.vx -= player.speed;
      player.face = -1;
    }
    if (right) {
      player.vx += player.speed;
      player.face = 1;
    }

    player.vx *= FRICTION;
    player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));

    if (jump && player.grounded) {
      player.vy = -player.jump;
      player.grounded = false;
      burst(player.x + player.w/2, player.y + player.h, "#ffffff", 8);
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    resolvePlatforms(player);

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > LEVEL_W) player.x = LEVEL_W - player.w;
    if (player.y > H + 120) loseLife();

    if (player.invincible > 0) player.invincible--;

    for (const c of coins) {
      if (c.got) continue;
      c.spin += 0.16;
      const coinBox = {x:c.x-c.r, y:c.y-c.r, w:c.r*2, h:c.r*2};
      if (rects(player, coinBox)) {
        c.got = true;
        coinsGot++;
        score += 100;
        burst(c.x, c.y, "#ffd22e", 10);
        if (coinsGot % 20 === 0) lives++;
        updateHUD();
      }
    }

    for (const p of powerups) {
      if (!p.active) continue;
      p.phase += 0.1;
      if (rects(player, p)) {
        p.active = false;
        player.big = true;
        player.h = 66;
        player.y -= 14;
        player.invincible = 80;
        score += 500;
        burst(p.x + p.w/2, p.y + p.h/2, "#ff4ad8", 18);
        updateHUD();
      }
    }

    for (const e of enemies) {
      if (!e.alive) {
        if (e.squash > 0) e.squash--;
        continue;
      }

      e.x += e.vx;
      if (e.x < e.min || e.x + e.w > e.max) e.vx *= -1;

      if (rects(player, e)) {
        if (player.vy > 1 && player.y + player.h - e.y < 24) {
          e.alive = false;
          e.squash = 28;
          player.vy = -10.5;
          score += 250;
          burst(e.x + e.w/2, e.y, "#8b4a1e", 12);
          updateHUD();
        } else {
          loseLife();
        }
      }
    }

    if (rects(player, {x:flag.x, y:flag.y, w:flag.w, h:flag.h})) {
      winGame();
    }

    cameraX = player.x - W * 0.42;
    cameraX = Math.max(0, Math.min(LEVEL_W - W, cameraX));

    updateParticles();
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(-cameraX, 0);

    drawBackground();
    drawPlatforms();
    drawCoins();
    drawPowerups();
    drawEnemies();
    drawFlag();
    drawPlayer();
    drawParticles();

    ctx.restore();

    if (state === "intro") {
      showMessage("SUPER PLUMBER", "Press Enter / Tap / Space to start");
    }
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,"#65ceff");
    grad.addColorStop(.7,"#a8edff");
    grad.addColorStop(.7,"#8be56d");
    grad.addColorStop(1,"#55bd46");
    ctx.fillStyle = grad;
    ctx.fillRect(cameraX,0,W,H);

    for (let i = -1; i < 9; i++) {
      const x = Math.floor(cameraX/600)*600 + i*600;
      drawCloud(x + 90, 90, 1);
      drawCloud(x + 390, 155, .75);
      drawHill(x + 150, FLOOR_Y, 180, "#62cc58");
      drawHill(x + 380, FLOOR_Y, 120, "#44b843");
    }

    ctx.fillStyle = "rgba(255,255,255,.16)";
    for (let x = 0; x < LEVEL_W; x += 120) {
      ctx.fillRect(x, FLOOR_Y + 8, 60, 6);
    }
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = "rgba(255,255,255,.88)";
    ctx.beginPath();
    ctx.arc(x, y, 28*s, 0, Math.PI*2);
    ctx.arc(x+32*s, y-12*s, 38*s, 0, Math.PI*2);
    ctx.arc(x+70*s, y, 28*s, 0, Math.PI*2);
    ctx.arc(x+35*s, y+12*s, 36*s, 0, Math.PI*2);
    ctx.fill();
  }

  function drawHill(x, base, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x-r, base);
    ctx.quadraticCurveTo(x, base-r*1.25, x+r, base);
    ctx.closePath();
    ctx.fill();
  }

  function drawPlatforms() {
    for (const p of platforms) {
      if (p.x + p.w < cameraX - 50 || p.x > cameraX + W + 50) continue;

      if (p.type === "ground") {
        ctx.fillStyle = "#9a5a2b";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#39b54a";
        ctx.fillRect(p.x, p.y, p.w, 18);
        ctx.fillStyle = "rgba(0,0,0,.13)";
        for (let x = p.x; x < p.x+p.w; x += 44) ctx.fillRect(x, p.y+25, 24, 10);
      } else if (p.type === "brick") {
        ctx.fillStyle = "#cf6830";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#7a321b";
        ctx.lineWidth = 3;
        for (let x = p.x; x < p.x+p.w; x += 32) ctx.strokeRect(x, p.y, 32, p.h);
      } else {
        ctx.fillStyle = "#b36b34";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#6b3b1a";
        ctx.lineWidth = 4;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
      }
    }
  }

  function drawCoins() {
    for (const c of coins) {
      if (c.got) continue;
      if (c.x < cameraX - 30 || c.x > cameraX + W + 30) continue;
      const w = Math.max(4, Math.abs(Math.cos(c.spin)) * 18);
      ctx.fillStyle = "#ffd533";
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, w/2, 13, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "#b98200";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "#fff4a8";
      ctx.fillRect(c.x-2, c.y-8, 4, 16);
    }
  }

  function drawPowerups() {
    for (const p of powerups) {
      if (!p.active) continue;
      ctx.fillStyle = "#ff3535";
      ctx.beginPath();
      ctx.arc(p.x+p.w/2, p.y+p.h/2 + Math.sin(p.phase)*2, 17, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(p.x+9, p.y+10, 5, 0, Math.PI*2);
      ctx.arc(p.x+20, p.y+8, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#f1c28a";
      ctx.fillRect(p.x+5, p.y+14, 18, 14);
      ctx.fillStyle = "#111";
      ctx.fillRect(p.x+10, p.y+19, 3, 3);
      ctx.fillRect(p.x+18, p.y+19, 3, 3);
    }
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.x + e.w < cameraX - 50 || e.x > cameraX + W + 50) continue;
      if (!e.alive && e.squash <= 0) continue;

      const h = e.alive ? e.h : 12;
      const y = e.alive ? e.y : e.y + e.h - h;

      ctx.fillStyle = "#8b4a1e";
      ctx.fillRect(e.x, y, e.w, h);
      ctx.fillStyle = "#5c2b10";
      ctx.fillRect(e.x+4, y+h-5, 9, 7);
      ctx.fillRect(e.x+23, y+h-5, 9, 7);

      if (e.alive) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(e.x+7, y+8, 7, 7);
        ctx.fillRect(e.x+22, y+8, 7, 7);
        ctx.fillStyle = "#000";
        ctx.fillRect(e.x+10, y+11, 3, 3);
        ctx.fillRect(e.x+25, y+11, 3, 3);
      }
    }
  }

  function drawFlag() {
    ctx.fillStyle = "#e8e8e8";
    ctx.fillRect(flag.x + 18, flag.y, 8, flag.h);
    ctx.fillStyle = "#18c955";
    ctx.beginPath();
    ctx.moveTo(flag.x+26, flag.y+12);
    ctx.lineTo(flag.x+115, flag.y+42);
    ctx.lineTo(flag.x+26, flag.y+72);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#dedede";
    ctx.fillRect(flag.x-8, flag.y+flag.h, 60, 20);
  }

  function drawPlayer() {
    if (player.invincible > 0 && Math.floor(player.invincible / 6) % 2 === 0) return;

    const x = player.x, y = player.y, w = player.w, h = player.h;
    const big = player.big;

    ctx.save();
    ctx.translate(x + w/2, y);
    ctx.scale(player.face, 1);
    ctx.translate(-w/2, 0);

    ctx.fillStyle = "#d71920";
    ctx.fillRect(3, 0, w-6, 15);
    ctx.fillRect(8, -5, w-2, 8);

    ctx.fillStyle = "#f2b177";
    ctx.fillRect(7, 13, w-12, 16);
    ctx.fillRect(w-8, 18, 6, 6);

    ctx.fillStyle = "#4b2815";
    ctx.fillRect(3, 18, 8, 6);

    ctx.fillStyle = "#111";
    ctx.fillRect(w-13, 18, 4, 4);

    ctx.fillStyle = "#245bcb";
    ctx.fillRect(6, 30, w-12, big ? h-38 : h-34);
    ctx.fillStyle = "#d71920";
    ctx.fillRect(0, 31, 9, big ? 25 : 18);
    ctx.fillRect(w-9, 31, 9, big ? 25 : 18);

    ctx.fillStyle = "#ffd13d";
    ctx.fillRect(11, 34, 5, 5);
    ctx.fillRect(w-16, 34, 5, 5);

    ctx.fillStyle = "#5b2c13";
    ctx.fillRect(2, h-8, 14, 8);
    ctx.fillRect(w-16, h-8, 14, 8);

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 50);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  function loop(t) {
    const dt = Math.min(32, t - lastTime || 16);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
    if (e.code === "Enter" || e.code === "Space") {
      if (state !== "play") startGame();
    }
  });

  window.addEventListener("keyup", e => {
    keys[e.code] = false;
  });

  document.getElementById("restart").addEventListener("click", () => {
    resetGame(true);
    state = "play";
    showMessage("", "", false);
  });

  canvas.addEventListener("pointerdown", () => {
    if (state !== "play") startGame();
  });

  document.querySelectorAll(".btn").forEach(btn => {
    const code = btn.dataset.key;
    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      keys[code] = true;
      if (state !== "play") startGame();
    });
    btn.addEventListener("pointerup", e => {
      e.preventDefault();
      keys[code] = false;
    });
    btn.addEventListener("pointerleave", () => keys[code] = false);
    btn.addEventListener("pointercancel", () => keys[code] = false);
  });

  resetGame(true);
  showMessage("SUPER PLUMBER", "Press Enter / Tap / Space to start");
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
