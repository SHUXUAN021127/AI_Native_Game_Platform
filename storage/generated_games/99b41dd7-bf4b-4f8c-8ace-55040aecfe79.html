<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f3b2d, #08120d 70%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .game-wrapper {
      width: min(94vw, 560px);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      letter-spacing: 4px;
      color: #7cff6b;
      text-shadow: 0 0 12px rgba(124, 255, 107, 0.6);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(124, 255, 107, 0.35);
      border-radius: 14px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.35);
    }

    .score-box {
      font-size: 20px;
      font-weight: bold;
    }

    .score-box span {
      color: #7cff6b;
    }

    .hint {
      font-size: 13px;
      color: #c7ffd0;
      opacity: 0.9;
    }

    .canvas-holder {
      position: relative;
      border-radius: 18px;
      padding: 10px;
      background: linear-gradient(145deg, #183524, #050b08);
      border: 2px solid rgba(124, 255, 107, 0.45);
      box-shadow:
        0 0 30px rgba(124, 255, 107, 0.15),
        inset 0 0 18px rgba(0, 0, 0, 0.7);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #0d1f14;
      border-radius: 10px;
    }

    .message {
      position: absolute;
      inset: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.72);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .message.show {
      display: flex;
    }

    .message h2 {
      margin: 0 0 10px;
      font-size: 38px;
      color: #ff5f5f;
      text-shadow: 0 0 12px rgba(255, 95, 95, 0.65);
    }

    .message p {
      margin: 5px 0;
      font-size: 17px;
      color: #ffffff;
    }

    .message button {
      margin-top: 16px;
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      background: #7cff6b;
      color: #071009;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(124, 255, 107, 0.5);
      transition: transform 0.15s, background 0.15s;
    }

    .message button:hover {
      transform: scale(1.05);
      background: #9aff8c;
    }

    .controls {
      margin-top: 14px;
      color: #b8ffc2;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 32px;
      }

      .top-bar {
        flex-direction: column;
      }

      .message h2 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>SNAKE</h1>

    <div class="top-bar">
      <div class="score-box">Score: <span id="score">0</span></div>
      <div class="score-box">Best: <span id="best">0</span></div>
      <div class="hint">No pause. Keep moving.</div>
    </div>

    <div class="canvas-holder">
      <canvas id="game" width="500" height="500"></canvas>

      <div id="message" class="message">
        <h2>Game Over</h2>
        <p>Your Score: <strong id="finalScore">0</strong></p>
        <p>Press Enter or click Restart</p>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <div class="controls">
      Use Arrow Keys or WASD to control the snake.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best;
    let gameOver;
    let moveDelay;
    let lastMoveTime;

    best = Number(localStorage.getItem("snakeBestScore")) || 0;
    bestEl.textContent = best;

    function startGame() {
      snake = [
        { x: 12, y: 12 },
        { x: 11, y: 12 },
        { x: 10, y: 12 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      moveDelay = 115;
      lastMoveTime = 0;

      scoreEl.textContent = score;
      messageEl.classList.remove("show");

      placeFood();
      requestAnimationFrame(gameLoop);
    }

    function placeFood() {
      let valid = false;

      while (!valid) {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };

        valid = !snake.some(part => part.x === food.x && part.y === food.y);
      }
    }

    function gameLoop(timestamp) {
      if (gameOver) {
        draw();
        return;
      }

      if (timestamp - lastMoveTime >= moveDelay) {
        update();
        lastMoveTime = timestamp;
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem("snakeBestScore", best);
        }

        if (moveDelay > 55) {
          moveDelay -= 2;
        }

        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      drawBackground();
      drawFood();
      drawSnake();
    }

    function drawBackground() {
      ctx.fillStyle = "#0d1f14";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(124, 255, 107, 0.06)";
      ctx.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        const px = part.x * gridSize;
        const py = part.y * gridSize;

        if (index === 0) {
          ctx.fillStyle = "#7cff6b";
          ctx.shadowColor = "#7cff6b";
          ctx.shadowBlur = 14;
        } else {
          const shade = Math.max(120, 230 - index * 4);
          ctx.fillStyle = `rgb(70, ${shade}, 88)`;
          ctx.shadowBlur = 0;
        }

        roundRect(px + 2, py + 2, gridSize - 4, gridSize - 4, 6);
        ctx.fill();

        if (index === 0) {
          ctx.shadowBlur = 0;
          drawEyes(part);
        }
      });
    }

    function drawEyes(head) {
      const cx = head.x * gridSize;
      const cy = head.y * gridSize;

      ctx.fillStyle = "#071009";

      let eye1;
      let eye2;

      if (direction.x === 1) {
        eye1 = { x: cx + 13, y: cy + 6 };
        eye2 = { x: cx + 13, y: cy + 14 };
      } else if (direction.x === -1) {
        eye1 = { x: cx + 7, y: cy + 6 };
        eye2 = { x: cx + 7, y: cy + 14 };
      } else if (direction.y === 1) {
        eye1 = { x: cx + 6, y: cy + 13 };
        eye2 = { x: cx + 14, y: cy + 13 };
      } else {
        eye1 = { x: cx + 6, y: cy + 7 };
        eye2 = { x: cx + 14, y: cy + 7 };
      }

      ctx.beginPath();
      ctx.arc(eye1.x, eye1.y, 2.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(eye2.x, eye2.y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFood() {
      const x = food.x * gridSize + gridSize / 2;
      const y = food.y * gridSize + gridSize / 2;

      ctx.shadowColor = "#ff4d6d";
      ctx.shadowBlur = 16;

      ctx.fillStyle = "#ff4d6d";
      ctx.beginPath();
      ctx.arc(x, y, gridSize * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ffffff";
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.arc(x - 3, y - 3, gridSize * 0.13, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function endGame() {
      gameOver = true;
      finalScoreEl.textContent = score;
      messageEl.classList.add("show");
    }

    function setDirection(newDir) {
      if (gameOver) return;

      const reversing =
        newDir.x === -direction.x &&
        newDir.y === -direction.y;

      if (!reversing) {
        nextDirection = newDir;
      }
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (
        key === "arrowup" ||
        key === "arrowdown" ||
        key === "arrowleft" ||
        key === "arrowright" ||
        key === "w" ||
        key === "a" ||
        key === "s" ||
        key === "d"
      ) {
        e.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        setDirection({ x: 0, y: -1 });
      } else if (key === "arrowdown" || key === "s") {
        setDirection({ x: 0, y: 1 });
      } else if (key === "arrowleft" || key === "a") {
        setDirection({ x: -1, y: 0 });
      } else if (key === "arrowright" || key === "d") {
        setDirection({ x: 1, y: 0 });
      } else if (key === "enter" && gameOver) {
        startGame();
      }
    });

    restartBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
